<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catacomb Underwriter - Professional Asset Evaluation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/app.css">
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const API_BASE_URL = window.location.origin;

        // Header Component
        function Header({ currentView, setCurrentView }) {
            const navItems = [
                { id: 'underwriter', label: 'Underwriter' },
                { id: 'asset-desk', label: 'Asset Desk' },
                { id: 'review-cards', label: 'Review Cards' },
                { id: 'portfolio', label: 'Portfolio' },
            ];

            return (
                <header className="border-b border-orange/10 backdrop-blur-sm bg-obsidian/80">
                    <div className="max-w-7xl mx-auto px-6 py-4">
                        <div className="flex items-center justify-between">
                            <div className="flex items-center gap-4">
                                <div className="w-10 h-10 rounded-lg bg-gradient-to-br from-orange to-gold flex items-center justify-center">
                                    <svg className="w-6 h-6 text-obsidian" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
                                    </svg>
                                </div>
                                <div>
                                    <h1 className="text-xl font-bold tracking-tight">Catacomb Underwriter</h1>
                                    <p className="text-xs text-stone tracking-wide">Professional Asset Evaluation</p>
                                </div>
                            </div>
                            <nav className="flex items-center gap-1">
                                {navItems.map((item) => (
                                    <button
                                        key={item.id}
                                        onClick={() => setCurrentView(item.id)}
                                        className={`px-4 py-2 text-sm font-medium transition-all ${
                                            currentView === item.id
                                                ? 'text-orange active'
                                                : 'text-stone hover:text-warm-white'
                                        }`}
                                    >
                                        {item.label}
                                    </button>
                                ))}
                            </nav>
                        </div>
                    </div>
                </header>
            );
        }

        // Underwriter View
        function UnderwriterView() {
            const [assetData, setAssetData] = useState({
                asset_id: '',
                asset_name: '',
                classification: '',
                primary_language: '',
                file_count: 0,
                has_tests: false,
                has_ci_cd: false,
                has_documentation: false,
                code_quality_score: 0,
                build_status: 'unknown',
                test_status: 'unknown',
                deployment_status: 'unknown',
                has_license: false,
                license_type: '',
                is_fork: false,
                ownership_clarity: 'unknown',
                repo_url: '',
                deployment_url: '',
            });
            const [evaluation, setEvaluation] = useState(null);
            const [loading, setLoading] = useState(false);

            const handleEvaluate = async () => {
                setLoading(true);
                try {
                    const response = await fetch(`${API_BASE_URL}/api/underwriter/evaluate`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(assetData),
                    });
                    const data = await response.json();
                    setEvaluation(data);
                } catch (error) {
                    console.error('Evaluation failed:', error);
                }
                setLoading(false);
            };

            return (
                <div className="max-w-7xl mx-auto px-6 py-8">
                    <h2 className="text-3xl font-bold mb-2 text-orange">Developer Asset Underwriter</h2>
                    <p className="text-stone mb-6">Professional evaluation of software assets for financeability and collateral support.</p>
                    
                    <div className="card-premium p-6 mb-6">
                        <h3 className="text-lg font-semibold mb-4">Asset Information</h3>
                        <div className="grid grid-cols-2 gap-4">
                            <input
                                placeholder="Asset Name"
                                value={assetData.asset_name}
                                onChange={(e) => setAssetData({...assetData, asset_name: e.target.value})}
                                className="bg-obsidian border border-stone/30 rounded px-3 py-2 text-sm"
                            />
                            <input
                                placeholder="Classification"
                                value={assetData.classification}
                                onChange={(e) => setAssetData({...assetData, classification: e.target.value})}
                                className="bg-obsidian border border-stone/30 rounded px-3 py-2 text-sm"
                            />
                            <input
                                placeholder="Primary Language"
                                value={assetData.primary_language}
                                onChange={(e) => setAssetData({...assetData, primary_language: e.target.value})}
                                className="bg-obsidian border border-stone/30 rounded px-3 py-2 text-sm"
                            />
                            <input
                                type="number"
                                placeholder="File Count"
                                value={assetData.file_count}
                                onChange={(e) => setAssetData({...assetData, file_count: parseInt(e.target.value) || 0})}
                                className="bg-obsidian border border-stone/30 rounded px-3 py-2 text-sm"
                            />
                        </div>
                        <div className="flex gap-2 mt-4">
                            <label className="flex items-center gap-2 text-sm">
                                <input
                                    type="checkbox"
                                    checked={assetData.has_tests}
                                    onChange={(e) => setAssetData({...assetData, has_tests: e.target.checked})}
                                />
                                Has Tests
                            </label>
                            <label className="flex items-center gap-2 text-sm">
                                <input
                                    type="checkbox"
                                    checked={assetData.has_ci_cd}
                                    onChange={(e) => setAssetData({...assetData, has_ci_cd: e.target.checked})}
                                />
                                Has CI/CD
                            </label>
                            <label className="flex items-center gap-2 text-sm">
                                <input
                                    type="checkbox"
                                    checked={assetData.has_documentation}
                                    onChange={(e) => setAssetData({...assetData, has_documentation: e.target.checked})}
                                />
                                Has Documentation
                            </label>
                        </div>
                        <button
                            onClick={handleEvaluate}
                            disabled={loading}
                            className="mt-4 px-6 py-2 bg-orange text-obsidian font-semibold rounded hover:bg-gold transition-colors disabled:opacity-50"
                        >
                            {loading ? 'Evaluating...' : 'Evaluate Asset'}
                        </button>
                    </div>

                    {evaluation && (
                        <div className="card-premium p-6">
                            <h3 className="text-lg font-semibold mb-4">Evaluation Results</h3>
                            <div className="grid grid-cols-2 gap-4 mb-4">
                                <div>
                                    <p className="text-stone text-sm">Production Grade</p>
                                    <p className="text-2xl font-bold text-orange">{evaluation.grades?.production_grade || 'N/A'}</p>
                                </div>
                                <div>
                                    <p className="text-stone text-sm">Commercial Grade</p>
                                    <p className="text-2xl font-bold text-orange">{evaluation.grades?.commercial_grade || 'N/A'}</p>
                                </div>
                                <div>
                                    <p className="text-stone text-sm">Collateral Grade</p>
                                    <p className="text-2xl font-bold text-orange">{evaluation.grades?.collateral_grade || 'N/A'}</p>
                                </div>
                                <div>
                                    <p className="text-stone text-sm">Financeability Score</p>
                                    <p className="text-2xl font-bold text-orange">{evaluation.grades?.financeability_score || 0}/100</p>
                                </div>
                            </div>
                            <div className="border-t border-stone/20 pt-4">
                                <p className="text-stone text-sm mb-2">Best Next Action</p>
                                <p className="text-warm-white">{evaluation.next_action?.action || 'N/A'}</p>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // Asset Desk View
        function AssetDeskView() {
            const [dashboard, setDashboard] = useState(null);
            const [loading, setLoading] = useState(false);

            useEffect(() => {
                setLoading(true);
                fetch(`${API_BASE_URL}/api/underwriter/dashboard`)
                    .then(res => res.json())
                    .then(data => {
                        setDashboard(data);
                        setLoading(false);
                    })
                    .catch(() => setLoading(false));
            }, []);

            if (loading) return <div className="max-w-7xl mx-auto px-6 py-8"><p className="text-stone">Loading asset desk...</p></div>;

            return (
                <div className="max-w-7xl mx-auto px-6 py-8">
                    <h2 className="text-3xl font-bold mb-2 text-orange">Asset Desk</h2>
                    <p className="text-stone mb-6">Professional portfolio management and asset tracking.</p>
                    
                    {dashboard && (
                        <div className="card-premium p-6 mb-6">
                            <h3 className="text-lg font-semibold mb-4">Portfolio Summary</h3>
                            <div className="grid grid-cols-4 gap-4">
                                <div>
                                    <p className="text-stone text-sm">Total Discovered</p>
                                    <p className="text-2xl font-bold text-warm-white">{dashboard.portfolio_summary?.total_discovered || 0}</p>
                                </div>
                                <div>
                                    <p className="text-stone text-sm">Real Assets</p>
                                    <p className="text-2xl font-bold text-green-400">{dashboard.portfolio_summary?.real_assets || 0}</p>
                                </div>
                                <div>
                                    <p className="text-stone text-sm">Buyer Ready</p>
                                    <p className="text-2xl font-bold text-orange">{dashboard.portfolio_summary?.buyer_ready || 0}</p>
                                </div>
                                <div>
                                    <p className="text-stone text-sm">Financeable</p>
                                    <p className="text-2xl font-bold text-gold">{dashboard.portfolio_summary?.fully_financeable || 0}</p>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // Review Cards View
        function ReviewCardsView() {
            return (
                <div className="max-w-7xl mx-auto px-6 py-8">
                    <h2 className="text-3xl font-bold mb-2 text-orange">Professional Review Cards</h2>
                    <p className="text-stone mb-6">Generate and manage professional review cards for software assets.</p>
                    <div className="card-premium p-12 text-center">
                        <p className="text-stone">Review cards are generated through the Underwriter evaluation process.</p>
                        <p className="text-stone text-sm mt-2">Navigate to the Underwriter view to evaluate assets and generate review cards.</p>
                    </div>
                </div>
            );
        }

        // Portfolio View
        function PortfolioView() {
            return (
                <div className="max-w-7xl mx-auto px-6 py-8">
                    <h2 className="text-3xl font-bold mb-2 text-orange">Portfolio</h2>
                    <p className="text-stone mb-6">Manage your software asset portfolio.</p>
                    <div className="card-premium p-12 text-center">
                        <p className="text-stone">Portfolio management requires authentication.</p>
                        <p className="text-stone text-sm mt-2">Sign in to access your portfolio.</p>
                    </div>
                </div>
            );
        }

        // Main App
        function App() {
            const [currentView, setCurrentView] = useState('underwriter');

            return (
                <div className="min-h-screen flex flex-col">
                    <Header currentView={currentView} setCurrentView={setCurrentView} />
                    <main className="flex-1">
                        {currentView === 'underwriter' && <UnderwriterView />}
                        {currentView === 'asset-desk' && <AssetDeskView />}
                        {currentView === 'review-cards' && <ReviewCardsView />}
                        {currentView === 'portfolio' && <PortfolioView />}
                    </main>
                    <footer className="border-t border-orange/10 py-4 px-6">
                        <div className="max-w-7xl mx-auto flex flex-wrap justify-between items-center gap-2 text-xs text-stone">
                            <p>
                                <span className="text-orange font-medium">Catacomb Underwriter</span> — Professional Asset Evaluation
                            </p>
                            <p>
                                Professional review cards are draft appraisals. Human review recommended.
                            </p>
                        </div>
                    </footer>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
