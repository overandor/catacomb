<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catacomb - Innovation Allocation Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'warm-white': '#f0f0f5',
                        'graphite': '#1a1a20',
                        'obsidian': '#0a0a0c',
                        'stone': '#8a8a96',
                        'crimson': '#ef4444',
                        'orange': '#ff6b35',
                        'gold': '#ffd700',
                    }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/app.css">
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;

        // Backend API URL - same origin for Vercel deployment
        const API_BASE_URL = window.API_BASE_URL || 
                           (window.location.hostname === 'localhost' ? 'http://localhost:5001' : 
                            window.location.origin);

        // Get stored token from localStorage
        const getToken = () => localStorage.getItem('auth_token');

        // Header Component
        function Header({ currentView, setCurrentView, userRole }) {
            const radarItems = [
                { id: 'radar', label: 'Radar' },
                { id: 'alpha', label: 'Alpha' },
                { id: 'search', label: 'Search' },
                { id: 'swipe', label: 'Swipe' },
            ];
            
            const underwriterItems = [
                { id: 'underwriter', label: 'Underwriter' },
                { id: 'asset-desk', label: 'Asset Desk' },
                { id: 'review-cards', label: 'Review Cards' },
                { id: 'portfolio', label: 'Portfolio' },
            ];
            
            const mineItems = [
                { id: 'mine', label: 'Mine' },
                { id: 'interventions', label: 'Interventions' },
                { id: 'ledger', label: 'Ledger' },
                { id: 'competency', label: 'Competency Graph' },
            ];
            
            const liveItem = { id: 'live', label: 'Live' };

            // Filter items based on user role
            const getVisibleItems = () => {
                if (!userRole) {
                    // Public tier: only radar items + live
                    return [...radarItems, liveItem];
                }
                
                if (userRole === 'professional') {
                    // Professional tier: radar + underwriter + live
                    return [...radarItems, ...underwriterItems, liveItem];
                }
                
                if (userRole === 'admin') {
                    // Admin tier: all items
                    return [...radarItems, ...underwriterItems, ...mineItems, liveItem];
                }
                
                return [...radarItems, liveItem];
            };

            const visibleItems = getVisibleItems();

            return (
                <header className="border-b border-orange/10 backdrop-blur-sm bg-obsidian/80">
                    <div className="max-w-7xl mx-auto px-6 py-4">
                        <div className="flex items-center justify-between">
                            <div className="flex items-center gap-4">
                                <div className="w-10 h-10 rounded-lg bg-gradient-to-br from-orange to-gold flex items-center justify-center">
                                    <svg className="w-6 h-6 text-obsidian" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
                                    </svg>
                                </div>
                                <div>
                                    <h1 className="text-xl font-bold tracking-tight">Catacomb</h1>
                                    <p className="text-xs text-stone tracking-wide">Innovation Allocation & Asset Underwriting</p>
                                </div>
                                <a href="https://membra-os.vercel.app" target="_blank" className="ml-3 px-2 py-1 rounded-md bg-purple-900/30 border border-purple-500/30 text-purple-300 text-xs font-medium hover:bg-purple-900/50 transition-colors flex items-center gap-1">
                                    <span className="w-2 h-2 rounded-full bg-purple-400 animate-pulse"></span>
                                    MEMBRA Constellation
                                </a>
                            </div>
                            <nav className="flex items-center gap-1">
                                {visibleItems.map((item) => (
                                    <button
                                        key={item.id}
                                        onClick={() => setCurrentView(item.id)}
                                        className={`nav-item px-3 py-2 text-sm font-medium transition-all ${
                                            currentView === item.id
                                                ? 'text-orange active'
                                                : 'text-stone hover:text-warm-white'
                                        }`}
                                    >
                                        {item.label}
                                    </button>
                                ))}
                                {userRole && (
                                    <div className="ml-4 flex items-center gap-2">
                                        <span className="text-xs text-stone">
                                            {userRole === 'admin' ? '🔑 Admin' : userRole === 'professional' ? '⭐ Professional' : '👤 Public'}
                                        </span>
                                    </div>
                                )}
                            </nav>
                        </div>
                    </div>
                </header>
            );
        }

        // Hero Section
        function HeroSection() {
            const [metrics, setMetrics] = useState({
                engineeringAlpha: 0,
                verifiedInterventions: 74,
                hiddenInfrastructure: 0,
                avgValueDelta: 0,
                predictionAccuracy: 0,
                transformationLaws: 0,
                assetsUnderWatch: 0,
            });

            useEffect(() => {
                // Fetch metrics from API
                fetch(`${API_BASE_URL}/api/metrics`, { cache: 'no-store' })
                    .then(res => res.json())
                    .then(data => setMetrics(data))
                    .catch(() => {
                        // Fallback to static values
                        setMetrics({
                            engineeringAlpha: 2847,
                            verifiedInterventions: 74,
                            hiddenInfrastructure: 156,
                            avgValueDelta: 42.3,
                            predictionAccuracy: 67.8,
                            transformationLaws: 23,
                            assetsUnderWatch: 10000,
                        });
                    });
            }, []);

            return (
                <div className="max-w-7xl mx-auto px-6 py-8">
                    <div className="mb-8">
                        <h2 className="text-4xl font-bold mb-2 tracking-tight">
                            <span className="text-orange glow-orange">Catacomb Radar</span>
                        </h2>
                        <p className="text-stone text-lg">Hidden software alpha, ranked by value unlocked per engineering day.</p>
                    </div>

                    <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-7 gap-4">
                        <MetricCard
                            label="Engineering Alpha Available Today"
                            value={`$${metrics.engineeringAlpha.toLocaleString()}`}
                            highlight
                        />
                        <MetricCard
                            label="Verified Interventions"
                            value={metrics.verifiedInterventions}
                        />
                        <MetricCard
                            label="Hidden Infrastructure Assets"
                            value={metrics.hiddenInfrastructure}
                        />
                        <MetricCard
                            label="Average Value Delta"
                            value={`${metrics.avgValueDelta}%`}
                        />
                        <MetricCard
                            label="Prediction Accuracy"
                            value={`${metrics.predictionAccuracy}%`}
                        />
                        <MetricCard
                            label="Reusable Transformation Laws"
                            value={metrics.transformationLaws}
                        />
                        <MetricCard
                            label="Assets Under Watch"
                            value={metrics.assetsUnderWatch.toLocaleString()}
                        />
                    </div>
                </div>
            );
        }

        function MetricCard({ label, value, highlight = false }) {
            return (
                <div className={`card-premium p-4 ${highlight ? 'card-high-opportunity' : ''}`}>
                    <p className="text-xs text-stone uppercase tracking-wider mb-2">{label}</p>
                    <p className={`metric-value text-2xl ${highlight ? 'text-orange glow-orange' : 'text-warm-white'}`}>
                        {value}
                    </p>
                </div>
            );
        }

        // Radar Card Component
        function RadarCard({ item, rank, onExpand }) {
            const [expanded, setExpanded] = useState(false);

            return (
                <div className={`card-premium p-6 ${expanded ? 'card-high-opportunity' : ''}`}>
                    <div className="flex items-start justify-between mb-4">
                        <div className="flex-1">
                            <div className="flex items-center gap-3 mb-2">
                                <span className="metric-value text-xl text-orange">#{rank}</span>
                                <h3 className="text-lg font-semibold">{item.repo}</h3>
                                <span className="badge badge-undervalued">Hidden Infrastructure</span>
                            </div>
                            <p className="text-stone text-sm">{item.repo_data?.description || 'No description available'}</p>
                        </div>
                        <div className="text-right">
                            <p className="metric-value text-3xl text-gold glow-gold">
                                ${item.value_per_day?.toFixed(2) || '0.00'}
                            </p>
                            <p className="text-xs text-stone">Value/Day</p>
                        </div>
                    </div>

                    <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
                        <MetricMini label="Hidden Score" value={item.hidden_infrastructure_score?.toFixed(2)} />
                        <MetricMini label="Innovation Alpha" value={item.innovation_alpha?.toFixed(2)} />
                        <MetricMini label="Value Delta" value={`${item.value_delta?.value_delta_percent?.toFixed(0)}%`} />
                        <MetricMini label="Effort Days" value={item.total_effort_days} />
                    </div>

                    <div className="bg-graphite/50 rounded-lg p-3 mb-4 border border-orange/10">
                        <p className="text-orange text-xs font-medium mb-1 uppercase tracking-wider">Best Intervention</p>
                        <p className="text-warm-white font-semibold">{item.best_intervention?.name || 'N/A'}</p>
                    </div>

                    <button
                        onClick={() => setExpanded(!expanded)}
                        className="text-stone text-sm hover:text-orange transition-colors"
                    >
                        {expanded ? 'Collapse Details' : 'Expand Analysis →'}
                    </button>

                    {expanded && (
                        <div className="mt-4 pt-4 border-t border-orange/10 space-y-4">
                            <div>
                                <p className="text-orange text-xs font-medium mb-2 uppercase tracking-wider">Current State</p>
                                <div className="grid grid-cols-2 gap-2 text-sm">
                                    <div className="flex justify-between">
                                        <span className="text-stone">Stars:</span>
                                        <span className="text-warm-white font-mono">{item.repo_data?.stars || 0}</span>
                                    </div>
                                    <div className="flex justify-between">
                                        <span className="text-stone">Forks:</span>
                                        <span className="text-warm-white font-mono">{item.repo_data?.forks || 0}</span>
                                    </div>
                                    <div className="flex justify-between">
                                        <span className="text-stone">Contributors:</span>
                                        <span className="text-warm-white font-mono">{item.repo_data?.contributors || 0}</span>
                                    </div>
                                    <div className="flex justify-between">
                                        <span className="text-stone">Language:</span>
                                        <span className="text-warm-white font-mono">{item.repo_data?.language || 'N/A'}</span>
                                    </div>
                                </div>
                            </div>

                            <div>
                                <p className="text-orange text-xs font-medium mb-2 uppercase tracking-wider">Achievable State</p>
                                <div className="grid grid-cols-2 gap-2 text-sm">
                                    <div className="flex justify-between">
                                        <span className="text-stone">Projected Value:</span>
                                        <span className="text-gold font-mono">{item.value_delta?.achievable_value?.toFixed(2) || '0.00'}</span>
                                    </div>
                                    <div className="flex justify-between">
                                        <span className="text-stone">Value Increase:</span>
                                        <span className="text-gold font-mono">{item.value_delta?.value_delta_percent?.toFixed(0)}%</span>
                                    </div>
                                </div>
                            </div>

                            <div>
                                <p className="text-orange text-xs font-medium mb-2 uppercase tracking-wider">Why Under-Recognized</p>
                                <p className="text-stone text-sm">
                                    Low recognition relative to ecosystem leverage. High transitive dependency count 
                                    ({item.transitive_dependency_count || 0}) with minimal current visibility.
                                </p>
                            </div>

                            <div>
                                <p className="text-orange text-xs font-medium mb-2 uppercase tracking-wider">Evidence Strength</p>
                                <div className="progress-bar-premium">
                                    <div className="progress-fill" style={{ width: '75%' }}></div>
                                </div>
                                <p className="text-stone text-xs mt-1">75% confidence based on ecosystem metrics</p>
                            </div>

                            <div>
                                <p className="text-orange text-xs font-medium mb-2 uppercase tracking-wider">Recommended Action</p>
                                <p className="text-warm-white text-sm">
                                    Execute {item.best_intervention?.name || 'intervention'} intervention. 
                                    Expected ROI: {item.value_per_day?.toFixed(2)} per engineering day.
                                </p>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function MetricMini({ label, value }) {
            return (
                <div className="bg-graphite/50 rounded-lg p-3 border border-orange/5">
                    <p className="text-stone text-xs mb-1">{label}</p>
                    <p className="text-warm-white font-semibold font-mono">{value || 'N/A'}</p>
                </div>
            );
        }

        function TerminalLog({ lines }) {
            const logEndRef = useRef(null);
            useEffect(() => { logEndRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [lines]);
            const typeColors = { ok: 'text-green-400', warn: 'text-orange', error: 'text-crimson', info: 'text-blue-400' };
            return (
                <div className="bg-graphite/30 border border-orange/10 rounded-lg p-4 font-mono text-xs overflow-y-auto max-h-[60vh]">
                    {lines.length === 0 && <p className="text-stone italic">No events recorded</p>}
                    {lines.map((line, i) => (
                        <div key={i} className="flex gap-3 py-1 border-b border-orange/5 last:border-0">
                            <span className="text-stone flex-shrink-0 w-16">{line.time}</span>
                            <span className={typeColors[line.type] || 'text-stone'}>{line.msg}</span>
                        </div>
                    ))}
                    <div ref={logEndRef} />
                </div>
            );
        }

        function LoadingSkeleton({ count = 3, height = 80 }) {
            return (
                <div className="space-y-3">
                    {Array.from({ length: count }).map((_, i) => (
                        <div key={i} className="card-premium p-4 animate-pulse">
                            <div className="h-4 bg-graphite/50 rounded w-1/3 mb-3"></div>
                            <div className="h-3 bg-graphite/30 rounded w-2/3 mb-2"></div>
                            <div className="h-3 bg-graphite/30 rounded w-1/2"></div>
                        </div>
                    ))}
                </div>
            );
        }

        // Radar View (Default Landing)
        function RadarView() {
            const [repos, setRepos] = useState([]);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);

            async function loadRadar() {
                setLoading(true);
                setError(null);
                try {
                    const res = await fetch(`${API_BASE_URL}/api/radar`, { cache: 'no-store' });
                    if (!res.ok) {
                        throw new Error(`HTTP ${res.status}: ${res.statusText}`);
                    }
                    const data = await res.json();
                    if (data.error) {
                        throw new Error(data.error);
                    }
                    if (Array.isArray(data.results) && data.results.length > 0) {
                        setRepos(data.results);
                    } else {
                        setRepos([]);
                    }
                } catch (err) {
                    console.error('Radar load failed:', err);
                    setError(err.message);
                    setRepos([]);
                } finally {
                    setLoading(false);
                }
            }

            useEffect(() => {
                loadRadar();
            }, []);

            if (loading) {
                return (
                    <div className="max-w-7xl mx-auto px-6 py-8">
                        <HeroSection />
                        <div className="space-y-4">
                            {[1, 2, 3, 4, 5].map((i) => (
                                <div key={i} className="card-premium p-6 loading-skeleton h-48"></div>
                            ))}
                        </div>
                    </div>
                );
            }

            return (
                <div className="max-w-7xl mx-auto px-6 py-8">
                    <HeroSection />
                    {error && (
                        <div className="mb-4 p-4 bg-crimson/10 border border-crimson/20 rounded-lg">
                            <p className="text-crimson text-sm font-medium">Error loading radar: {error}</p>
                            <button onClick={loadRadar} className="mt-2 text-xs text-orange hover:text-gold underline">Retry</button>
                        </div>
                    )}
                    <div className="space-y-4">
                        {repos.length === 0 ? (
                            <div className="card-premium p-12 text-center">
                                <p className="text-stone text-lg">Radar data unavailable</p>
                                <p className="text-stone text-sm mt-2">The outcome ledger has no verified interventions to display. Run mining or check API connectivity.</p>
                                <button onClick={loadRadar} className="mt-4 px-4 py-2 bg-orange/20 border border-orange/30 text-orange text-sm rounded hover:bg-orange/30 transition-all">Refresh</button>
                            </div>
                        ) : (
                            repos.map((item, index) => (
                                <RadarCard key={`${item.repo}-${index}`} item={item} rank={index + 1} />
                            ))
                        )}
                    </div>
                </div>
            );
        }

        // Alpha View
        function AlphaView() {
            const [repos, setRepos] = useState([]);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);

            async function loadAlpha() {
                setLoading(true);
                setError(null);
                try {
                    const res = await fetch(`${API_BASE_URL}/api/discover/promising`, { cache: 'no-store' });
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    const data = await res.json();
                    if (data.error) throw new Error(data.error);
                    setRepos(Array.isArray(data.results) ? data.results : []);
                } catch (err) {
                    console.error('Alpha load failed:', err);
                    setError(err.message);
                    setRepos([]);
                } finally {
                    setLoading(false);
                }
            }

            useEffect(() => { loadAlpha(); }, []);

            if (loading) {
                return (
                    <div className="max-w-7xl mx-auto px-6 py-8">
                        <h2 className="text-3xl font-bold mb-6 text-orange">Alpha Universe</h2>
                        <div className="space-y-4">
                            {[1, 2, 3, 4, 5].map((i) => (
                                <div key={i} className="card-premium p-6 loading-skeleton h-48"></div>
                            ))}
                        </div>
                    </div>
                );
            }

            return (
                <div className="max-w-7xl mx-auto px-6 py-8">
                    <h2 className="text-3xl font-bold mb-2 text-orange">Alpha Universe</h2>
                    <p className="text-stone mb-6">Assets with positive Innovation Alpha (undervalued)</p>
                    {error && (
                        <div className="mb-4 p-4 bg-crimson/10 border border-crimson/20 rounded-lg">
                            <p className="text-crimson text-sm font-medium">Error: {error}</p>
                            <button onClick={loadAlpha} className="mt-2 text-xs text-orange hover:text-gold underline">Retry</button>
                        </div>
                    )}
                    <div className="space-y-4">
                        {repos.length === 0 ? (
                            <div className="card-premium p-12 text-center">
                                <p className="text-stone text-lg">No alpha opportunities available</p>
                                <p className="text-stone text-sm mt-2">No assets currently show positive Innovation Alpha. All tracked assets are priced at or above expected future value.</p>
                                <button onClick={loadAlpha} className="mt-4 px-4 py-2 bg-orange/20 border border-orange/30 text-orange text-sm rounded hover:bg-orange/30 transition-all">Refresh</button>
                            </div>
                        ) : (
                            repos.map((item, index) => (
                                <RadarCard key={`${item.repo}-${index}`} item={item} rank={index + 1} />
                            ))
                        )}
                    </div>
                </div>
            );
        }

        // Intervention View with Repo Passport
        function InterventionView() {
            const [interventions, setInterventions] = useState([]);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [expandedId, setExpandedId] = useState(null);

            async function loadInterventions() {
                setLoading(true); setError(null);
                try {
                    const res = await fetch(`${API_BASE_URL}/api/interventions?limit=200`, { cache: 'no-store' });
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    const data = await res.json();
                    if (data.error) throw new Error(data.error);
                    setInterventions(Array.isArray(data.records) ? data.records : []);
                } catch (err) {
                    console.error('Interventions load failed:', err);
                    setError(err.message);
                    setInterventions([]);
                } finally { setLoading(false); }
            }

            useEffect(() => { loadInterventions(); }, []);

            if (loading) {
                return (
                    <div className="max-w-7xl mx-auto px-6 py-8">
                        <h2 className="text-3xl font-bold mb-6 text-orange">Intervention Ledger</h2>
                        <LoadingSkeleton count={5} height={120} />
                    </div>
                );
            }

            return (
                <div className="max-w-7xl mx-auto px-6 py-8">
                    <h2 className="text-3xl font-bold mb-2 text-orange">Intervention Ledger</h2>
                    <p className="text-stone mb-6">{interventions.length.toLocaleString()} tracked interventions with full repo passport and evidence trace</p>
                    {error && (
                        <div className="mb-4 p-4 bg-crimson/10 border border-crimson/20 rounded-lg">
                            <p className="text-crimson text-sm font-medium">Error: {error}</p>
                            <button onClick={loadInterventions} className="mt-2 text-xs text-orange hover:text-gold underline">Retry</button>
                        </div>
                    )}
                    <div className="space-y-3">
                        {interventions.length === 0 ? (
                            <div className="card-premium p-12 text-center">
                                <p className="text-stone text-lg">No interventions available</p>
                                <p className="text-stone text-sm mt-2">No intervention records found. Mine GitHub PRs or manually create interventions.</p>
                                <button onClick={loadInterventions} className="mt-4 px-4 py-2 bg-orange/20 border border-orange/30 text-orange text-sm rounded hover:bg-orange/30 transition-all">Refresh</button>
                            </div>
                        ) : (
                            interventions.map((item, index) => {
                                const before = typeof item.before_state === 'object' ? item.before_state : {};
                                const after = typeof item.after_state === 'object' ? item.after_state : null;
                                const metrics = typeof item.outcome_metrics === 'object' ? item.outcome_metrics : null;
                                const isOpen = expandedId === item.record_id;
                                return (
                                    <div key={item.record_id || index} className={`card-premium p-5 ${isOpen ? 'border-orange/40' : ''}`}>
                                        <div className="flex items-start justify-between cursor-pointer" onClick={() => setExpandedId(isOpen ? null : item.record_id)}>
                                            <div className="flex-1 min-w-0">
                                                <div className="flex items-center gap-2 flex-wrap mb-1">
                                                    <span className="metric-value text-sm text-orange">#{index + 1}</span>
                                                    <h3 className="text-base font-semibold truncate">{item.asset_id}</h3>
                                                    <span className={`badge ${item.status === 'verified' ? 'badge-verified' : item.status === 'failed' ? 'badge-risk' : 'badge-undervalued'}`}>{item.status}</span>
                                                    <span className="badge badge-undervalued">{item.verification_status}</span>
                                                </div>
                                                <p className="text-stone text-sm truncate">{item.intervention_description || item.intervention_type}</p>
                                            </div>
                                            <div className="text-right ml-4 flex-shrink-0">
                                                <p className="metric-value text-xl text-gold">${item.predicted_value?.toLocaleString()}</p>
                                                <p className="text-xs text-stone">predicted value</p>
                                            </div>
                                        </div>
                                        <div className="mt-3 grid grid-cols-2 md:grid-cols-6 gap-2 text-xs">
                                            <div className="bg-graphite/40 rounded p-2"><p className="text-stone uppercase tracking-wider">Stars</p><p className="font-mono text-warm-white">{before.stars?.toLocaleString() || '—'}</p></div>

        // Swipe View (Premium Asset Discovery)
        function SwipeView() {
            const [currentIndex, setCurrentIndex] = useState(0);
            const [saved, setSaved] = useState([]);
            const [ignored, setIgnored] = useState([]);
            const [repos, setRepos] = useState([]);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [swipeAnim, setSwipeAnim] = useState(null);

            async function loadSwipe() {
                setLoading(true); setError(null);
                try {
                    const res = await fetch(`${API_BASE_URL}/api/discover/promising`, { cache: 'no-store' });
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    const data = await res.json();
                    if (data.error) throw new Error(data.error);
                    setRepos(Array.isArray(data.results) ? data.results : []);
                    setCurrentIndex(0); setSaved([]); setIgnored([]);
                } catch (err) {
                    console.error('Swipe load failed:', err);
                    setError(err.message); setRepos([]);
                } finally { setLoading(false); }
            }

            useEffect(() => { loadSwipe(); }, []);

            useEffect(() => {
                function onKey(e) {
                    if (currentIndex >= repos.length) return;
                    if (e.key === 'ArrowLeft') { e.preventDefault(); doSwipe('left'); }
                    else if (e.key === 'ArrowRight') { e.preventDefault(); doSwipe('right'); }
                    else if (e.key === 'ArrowUp') { e.preventDefault(); doSwipe('up'); }
                    else if (e.key === 'ArrowDown') { e.preventDefault(); if (currentIndex > 0) setCurrentIndex(currentIndex - 1); }
                }
                window.addEventListener('keydown', onKey);
                return () => window.removeEventListener('keydown', onKey);
            }, [currentIndex, repos.length]);

            function doSwipe(direction) {
                if (currentIndex >= repos.length || !repos[currentIndex]) return;
                setSwipeAnim(direction);
                setTimeout(() => {
                    if (direction === 'right' && repos[currentIndex]) setSaved([...saved, repos[currentIndex]]);
                    if (direction === 'left' && repos[currentIndex]) setIgnored([...ignored, repos[currentIndex]]);
                    setCurrentIndex(currentIndex + 1);
                    setSwipeAnim(null);
                }, 250);
            }

            if (loading) {
                return (
                    <div className="max-w-7xl mx-auto px-6 py-8">
                        <h2 className="text-3xl font-bold mb-6 text-orange">Swipe Discovery</h2>
                        <LoadingSkeleton count={1} height={400} />
                    </div>
                );
            }

            if (repos.length === 0) {
                return (
                    <div className="max-w-7xl mx-auto px-6 py-8">
                        <h2 className="text-3xl font-bold mb-6 text-orange">Swipe Discovery</h2>
                        <div className="card-premium p-12 text-center">
                            {error ? (
                                <>
                                    <p className="text-crimson text-sm font-medium">Error: {error}</p>
                                    <button onClick={loadSwipe} className="mt-4 px-4 py-2 bg-orange/20 border border-orange/30 text-orange text-sm rounded hover:bg-orange/30 transition-all">Retry</button>
                                </>
                            ) : (
                                <p className="text-stone">No assets available for discovery.</p>
                            )}
                        </div>
                    </div>
                );
            }

            if (currentIndex >= repos.length) {
                return (
                    <div className="max-w-7xl mx-auto px-6 py-8">
                        <h2 className="text-3xl font-bold mb-6 text-orange">Swipe Discovery</h2>
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                            <div className="card-premium p-6 text-center">
                                <p className="metric-value text-3xl text-gold">{saved.length}</p>
                                <p className="text-stone text-sm">Saved Opportunities</p>
                            </div>
                            <div className="card-premium p-6 text-center">
                                <p className="metric-value text-3xl text-crimson">{ignored.length}</p>
                                <p className="text-stone text-sm">Ignored</p>
                            </div>
                            <div className="card-premium p-6 text-center">
                                <p className="metric-value text-3xl text-warm-white">{repos.length}</p>
                                <p className="text-stone text-sm">Total Reviewed</p>
                            </div>
                        </div>
                        {saved.length > 0 && (
                            <div className="card-premium p-6">
                                <h3 className="text-lg font-semibold mb-4 text-orange">Saved Opportunities</h3>
                                <div className="space-y-2">
                                    {saved.map((r, i) => (
                                        <div key={i} className="flex justify-between items-center p-3 bg-graphite/30 rounded">
                                            <span className="font-mono text-sm">{r.repo}</span>
                                            <span className="text-gold font-mono">${r.value_per_day?.toFixed(2)}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                        <button onClick={loadSwipe} className="mt-6 px-6 py-3 bg-orange/20 border border-orange/30 text-orange rounded-lg hover:bg-orange/30 transition-all">Start New Session</button>
                    </div>
                );
            }

            const r = repos[currentIndex];
            const animClass = swipeAnim === 'left' ? 'translate-x-[-120%] opacity-0' : swipeAnim === 'right' ? 'translate-x-[120%] opacity-0' : swipeAnim === 'up' ? 'translate-y-[-120%] opacity-0' : '';

            return (
                <div className="max-w-5xl mx-auto px-6 py-8">
                    <div className="flex items-center justify-between mb-6">
                        <div>
                            <h2 className="text-3xl font-bold text-orange">Swipe Discovery</h2>
                            <p className="text-stone">{currentIndex + 1} of {repos.length} • {saved.length} saved • {ignored.length} ignored</p>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={() => doSwipe('left')} className="px-4 py-2 bg-crimson/20 border border-crimson/30 text-crimson text-sm rounded-lg hover:bg-crimson/30 transition-all">← Ignore</button>
                            <button onClick={() => doSwipe('up')} className="px-4 py-2 bg-graphite/50 border border-orange/20 text-stone text-sm rounded-lg hover:bg-graphite transition-all">↑ Mine</button>
                            <button onClick={() => doSwipe('right')} className="px-4 py-2 bg-orange/20 border border-orange/30 text-orange text-sm rounded-lg hover:bg-orange/30 transition-all">Save →</button>

                                <p className="metric-value text-3xl text-gold glow-gold">${r.value_per_day?.toFixed(2) || '0.00'}</p>
                                <p className="text-xs text-stone">value / day</p>

                        <div className="grid grid-cols-2 md:grid-cols-5 gap-3 mb-6">

                                <p className="metric-value text-xl text-orange">{r.innovation_alpha?.toFixed(2)}</p>
                                <p className="text-xs text-stone">Innovation Alpha</p>
                            </div>
                            <div className="bg-graphite/40 rounded-lg p-3 text-center">

                                <p className="text-xs text-stone">Value Delta</p>

                            <div className="bg-graphite/40 rounded-lg p-3 text-center">

        // Search View
        function SearchView() {
            const [query, setQuery] = useState('');
            const [searchType, setSearchType] = useState('repo');
            const [results, setResults] = useState([]);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);
            const [suggestions, setSuggestions] = useState([]);
            const [showSuggestions, setShowSuggestions] = useState(false);
            const [recommendedUsers, setRecommendedUsers] = useState([
                { username: 'torvalds', repos: 3, stars: '150K+', description: 'Linux kernel creator, high-impact developer' },
                { username: 'gaearon', repos: 12, stars: '200K+', description: 'React core team, JavaScript ecosystem leader' },
                { username: 'sindresorhus', repos: 1000, stars: '500K+', description: 'Prolific open source maintainer, npm ecosystem' },
                { username: 'd3', repos: 8, stars: '100K+', description: 'Data visualization library, high utility' },
                { username: 'tensorflow', repos: 15, stars: '180K+', description: 'Machine learning framework, AI infrastructure' },
            ]);
            const [autoDiscovery, setAutoDiscovery] = useState({ active: false, nextSearch: null, currentUser: null });
            const [userPages, setUserPages] = useState({});

            // Auto-discovery timer (every 3 minutes)
            useEffect(() => {
                if (!autoDiscovery.active) return;
                const interval = setInterval(() => {
                    if (autoDiscovery.currentUser) {
                        discoverUser(autoDiscovery.currentUser);
                    }
                }, 180000); // 3 minutes
                return () => clearInterval(interval);
            }, [autoDiscovery]);

            // Presearch suggestions
            useEffect(() => {
                if (query.length < 2) {
                    setSuggestions([]);
                    setShowSuggestions(false);
                    return;
                }
                if (searchType === 'user') {
                    const filtered = recommendedUsers.filter(u => 
                        u.username.toLowerCase().includes(query.toLowerCase())
                    ).slice(0, 5);
                    setSuggestions(filtered);
                    setShowSuggestions(filtered.length > 0);
                }
            }, [query, searchType]);

            async function handleSearch(e) {
                e.preventDefault();
                if (!query.trim()) return;
                setShowSuggestions(false);
                setLoading(true); setError(null); setResults([]);
                try {
                    let url, body, method = 'GET';
                    if (searchType === 'repo') {
                        const parts = query.trim().split('/');
                        if (parts.length !== 2) throw new Error('Format: owner/repo');
                        url = `${API_BASE_URL}/api/analyze/repo/${encodeURIComponent(parts[0])}/${encodeURIComponent(parts[1])}`;
                    } else if (searchType === 'topic') {
                        url = `${API_BASE_URL}/api/analyze/topic`;
                        method = 'POST';
                        body = JSON.stringify({ topic: query.trim(), limit: 10 });
                    } else if (searchType === 'user') {
                        url = `${API_BASE_URL}/api/analyze/user`;
                        method = 'POST';
                        body = JSON.stringify({ username: query.trim(), limit: 10 });
                    }
                    const opts = { method, headers: {}, cache: 'no-store' };
                    if (body) { opts.headers['Content-Type'] = 'application/json'; opts.body = body; }
                    const res = await fetch(url, opts);
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    const data = await res.json();
                    if (data.error) throw new Error(data.error);
                    if (searchType === 'repo') {
                        setResults([{ repo: query.trim(), ...data }]);
                    } else {
                        setResults(data.results || []);
                    }
                } catch (e) { setError(e.message); }
                finally { setLoading(false); }
            }

            async function discoverUser(username) {
                setLoading(true);
                try {
                    // Fetch all pages for complete data exposure
                    let allResults = [];
                    let page = 1;
                    let hasMore = true;
                    
                    while (hasMore) {
                        const res = await fetch(`${API_BASE_URL}/api/analyze/user`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ username, limit: 50, page })
                        });
                        const data = await res.json();
                        
                        if (data.results && data.results.length > 0) {
                            allResults = [...allResults, ...data.results];
                            page++;
                            // Stop if we got fewer results than limit (last page)
                            hasMore = data.results.length === 50;
                        } else {
                            hasMore = false;
                        }
                    }
                    
                    if (allResults.length > 0) {
                        setUserPages(prev => ({ ...prev, [username]: allResults }));
                        setResults(allResults);
                    }
                } catch (e) { console.error('Discovery error:', e); }
                finally { setLoading(false); }
            }

            function startAutoDiscovery(username) {
                setAutoDiscovery({
                    active: true,
                    nextSearch: new Date(Date.now() + 180000),
                    currentUser: username
                });
                discoverUser(username);
            }

            function stopAutoDiscovery() {
                setAutoDiscovery({ active: false, nextSearch: null, currentUser: null });
            }

            async function selectSuggestion(username) {
                setQuery(username);
                setShowSuggestions(false);
                setSearchType('user');
                await new Promise(r => setTimeout(r, 10));
                await handleSearch({ preventDefault: () => {} });
            }

            return (
                <div className="max-w-7xl mx-auto px-6 py-8">
                    <h2 className="text-3xl font-bold mb-2 text-orange">Search</h2>
                    <p className="text-stone mb-6">Global search across repositories, developers, packages, and interventions.</p>

                    <div className="card-premium p-4 mb-6">
                        <h3 className="text-sm font-medium text-orange mb-3">Recommended Developers</h3>
                        <div className="flex flex-wrap gap-2">
                            {recommendedUsers.map((u, i) => (
                                <button
                                    key={i}
                                    onClick={() => selectSuggestion(u.username)}
                                    className="px-3 py-2 bg-graphite border border-orange/20 rounded-lg text-xs hover:border-orange/40 transition-all text-left"
                                >
                                    <div className="font-medium text-warm-white">{u.username}</div>
                                    <div className="text-stone text-[10px]">{u.repos} repos • {u.stars} stars</div>
                                </button>
                            ))}
                        </div>
                    </div>

                    <form onSubmit={handleSearch} className="card-premium p-4 mb-6 relative">
                        <div className="flex flex-wrap gap-3">
                            <select className="bg-graphite border border-orange/20 rounded-lg px-4 py-3 text-warm-white text-sm" value={searchType} onChange={e=>setSearchType(e.target.value)}>
                                <option value="repo">Repository (owner/repo)</option>
                                <option value="topic">Topic</option>
                                <option value="user">User</option>
                            </select>
                            <div className="flex-1 min-w-[200px] relative">
                                <input
                                    className="w-full bg-graphite border border-orange/20 rounded-lg px-4 py-3 text-warm-white text-sm"
                                    value={query}
                                    onChange={e=>setQuery(e.target.value)}
                                    onFocus={()=>setShowSuggestions(true)}
                                    onBlur={()=>setTimeout(()=>setShowSuggestions(false), 200)}
                                    placeholder={searchType==='repo'?'owner/repo':searchType==='topic'?'machine-learning':'github-username'}
                                />
                                {showSuggestions && suggestions.length > 0 && (
                                    <div className="absolute top-full left-0 right-0 mt-1 bg-graphite border border-orange/20 rounded-lg shadow-xl z-10 max-h-60 overflow-y-auto">
                                        {suggestions.map((s, i) => (
                                            <div key={i} onClick={() => selectSuggestion(s.username)} className="px-4 py-3 hover:bg-orange/10 cursor-pointer border-b border-orange/10 last:border-0">
                                                <div className="font-medium text-warm-white">{s.username}</div>
                                                <div className="text-stone text-xs">{s.description}</div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                            <button type="submit" className="px-6 py-3 bg-orange/20 border border-orange/30 text-orange font-medium rounded-lg hover:bg-orange/30 transition-all" disabled={loading}>{loading?'Searching...':'Search'}</button>
                        </div>
                    </form>

                    {searchType === 'user' && query && (
                        <div className="card-premium p-4 mb-6">
                            <div className="flex items-center justify-between">
                                <div>
                                    <h3 className="text-sm font-medium text-orange">Auto-Discovery Mode</h3>
                                    <p className="text-stone text-xs mt-1">Automatically search for new data every 3 minutes</p>
                                </div>
                                <div className="flex items-center gap-3">
                                    {autoDiscovery.active && <span className="text-xs text-stone">Next: {autoDiscovery.nextSearch?.toLocaleTimeString()}</span>}
                                    {autoDiscovery.active ? (
                                        <button onClick={stopAutoDiscovery} className="px-4 py-2 bg-crimson/20 border border-crimson/30 text-crimson text-sm rounded-lg hover:bg-crimson/30 transition-all">Stop</button>
                                    ) : (
                                        <button onClick={() => startAutoDiscovery(query)} className="px-4 py-2 bg-orange/20 border border-orange/30 text-orange text-sm rounded-lg hover:bg-orange/30 transition-all">Start</button>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {error && <div className="card-premium p-4 mb-4 border-l-4 border-crimson"><p className="text-crimson text-sm">{error}</p></div>}

                    {results.length === 0 && !loading && !error && (
                        <div className="card-premium p-12 text-center">
                            <p className="text-stone">Enter a search query to find software assets.</p>
                            <p className="text-stone text-sm mt-2">Search requires a valid GitHub token for API access.</p>
                        </div>
                    )}

                    {loading && <LoadingSkeleton count={3} height={80} />}

                    {results.length > 0 && <p className="text-stone text-sm mb-3">{results.length} results</p>}

                    <div className="space-y-3">
                        {results.map((r,i)=>{
                            const rd = r.repo_data || {};
                            const a = r.analysis || {};
                            const inter = r.best_intervention || {};
                            return (
                                <div key={i} className="card-premium p-5">
                                    <div className="flex items-start justify-between mb-3">
                                        <div>
                                            <div className="flex items-center gap-2 mb-1">
                                                <span className="badge badge-undervalued">{r.repo ? 'Repo' : r.asset_id ? 'Asset' : 'Result'}</span>
                                                {rd.language && <span className="badge badge-verified">{rd.language}</span>}
                                                {r.verification_status && <span className={`badge ${r.verification_status==='verified'?'badge-verified':'badge-undervalued'}`}>{r.verification_status}</span>}
                                            </div>
                                            <h3 className="font-semibold text-lg">{r.repo || r.asset_id || r.asset_name || 'Unknown'}</h3>
                                            <p className="text-stone text-sm mt-1">{rd.description || r.intervention_description || 'No description'}</p>
                                        </div>
                                        <div className="text-right">
                                            {r.value_per_day != null && <p className="metric-value text-xl text-gold">${r.value_per_day.toFixed(2)}</p>}
                                            {r.predicted_value != null && <p className="metric-value text-xl text-gold">${r.predicted_value.toLocaleString()}</p>}
                                            <p className="text-xs text-stone">{r.value_per_day != null ? 'value/day' : 'predicted'}</p>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 md:grid-cols-5 gap-2 text-xs">
                                        {rd.stars != null && <div className="bg-graphite/40 rounded p-2"><span className="text-stone">Stars</span><p className="font-mono text-warm-white">{rd.stars.toLocaleString()}</p></div>}
                                        {rd.forks != null && <div className="bg-graphite/40 rounded p-2"><span className="text-stone">Forks</span><p className="font-mono text-warm-white">{rd.forks.toLocaleString()}</p></div>}
                                        {a.intervention_score > 0 && <div className="bg-graphite/40 rounded p-2"><span className="text-stone">Score</span><p className="font-mono text-warm-white">{a.intervention_score.toFixed(1)}</p></div>}
                                        {r.innovation_alpha != null && <div className="bg-graphite/40 rounded p-2"><span className="text-stone">Alpha</span><p className="font-mono text-orange">{r.innovation_alpha.toFixed(2)}</p></div>}
                                        {r.planned_effort_days != null && <div className="bg-graphite/40 rounded p-2"><span className="text-stone">Effort</span><p className="font-mono text-warm-white">{r.planned_effort_days}d</p></div>}
                                        {inter.name && <div className="bg-graphite/40 rounded p-2 col-span-2 md:col-span-3"><span className="text-stone">Intervention</span><p className="font-mono text-warm-white">{inter.name} ({(inter.probability*100).toFixed(0)}%)</p></div>}
                                        {r.intervention_type && <div className="bg-graphite/40 rounded p-2"><span className="text-stone">Type</span><p className="font-mono text-warm-white">{r.intervention_type}</p></div>}
                                        {r.status && <div className="bg-graphite/40 rounded p-2"><span className="text-stone">Status</span><p className="font-mono text-warm-white">{r.status}</p></div>}
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        }
