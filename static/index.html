                                </div>
                                <div className="bg-graphite/40 rounded p-3 text-center">
                                    <p className="metric-value text-xl text-green-400">{report.one_best_next_action || 'N/A'}</p>
                                    <p className="text-xs text-stone">Next Action</p>
                                </div>
                            </div>

                            {financeability.blockers?.length > 0 && (
                                <div className="mb-4">
                                    <p className="text-orange text-xs uppercase tracking-wider mb-2">Blockers</p>
                                    <div className="space-y-1">
                                        {financeability.blockers.map((b, i) => (
                                            <div key={i} className="flex items-center gap-2 text-sm text-stone"><span className="w-1.5 h-1.5 rounded-full bg-crimson"></span>{b}</div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {report.recommended_actions?.length > 0 && (
                                <div>
                                    <p className="text-green-400 text-xs uppercase tracking-wider mb-2">Recommended Actions</p>
                                    <div className="space-y-1">
                                        {report.recommended_actions.slice(0, 5).map((a, i) => (
                                            <div key={i} className="flex items-center gap-2 text-sm text-stone"><span className="w-1.5 h-1.5 rounded-full bg-green-400"></span>{a}</div>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        }

        // Portfolio View
        function PortfolioView() {
            const [repos, setRepos] = useState('');
            const [audit, setAudit] = useState(null);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);

            async function runAudit() {
                const lines = repos.split('\n').map(l => l.trim()).filter(Boolean);
                const parsed = lines.map(l => {
                    const parts = l.split('/');
                    return parts.length === 2 ? { owner: parts[0], repo: parts[1] } : null;
                }).filter(Boolean);
                if (parsed.length === 0) { setError('Enter repos as owner/repo, one per line'); return; }
                setLoading(true); setError(null); setAudit(null);
                try {
                    const res = await fetch(`${API_BASE_URL}/api/collateral/portfolio_audit`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ repos: parsed })
                    });
                    const data = await res.json();
                    if (!res.ok || data.error) throw new Error(data.error || `HTTP ${res.status}`);
                    setAudit(data);
                } catch (err) {
                    setError(err.message);
                } finally {
                    setLoading(false);
                }
            }

            const report = audit?.portfolio_report || {};

            return (
                <div className="max-w-7xl mx-auto px-6 py-8">
                    <h2 className="text-3xl font-bold mb-2 text-orange">Portfolio Audit</h2>
                    <p className="text-stone mb-6">Run a portfolio-level asset improvement audit across multiple repos.</p>

                    <div className="card-premium p-6 mb-6">
                        <label className="text-stone text-xs uppercase tracking-wider mb-2 block">Repos (owner/repo, one per line)</label>
                        <textarea value={repos} onChange={e => setRepos(e.target.value)} rows={5} placeholder="facebook/react\nvuejs/vue\nangular/angular" className="w-full bg-graphite border border-orange/20 rounded-lg px-4 py-3 text-warm-white text-sm font-mono mb-3" />
                        <div className="flex gap-3">
                            <button onClick={runAudit} disabled={loading} className="px-6 py-3 bg-orange/20 border border-orange/30 text-orange rounded-lg hover:bg-orange/30 disabled:opacity-50 transition-all">{loading ? 'Auditing...' : 'Run Portfolio Audit'}</button>
                            <button onClick={() => setRepos('')} className="px-4 py-3 bg-graphite/50 border border-orange/20 text-stone rounded-lg hover:bg-graphite transition-all">Clear</button>
                        </div>
                        {error && <p className="text-crimson text-sm mt-3">{error}</p>}
                    </div>

                    {audit && (
                        <div className="space-y-4">
                            <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
                                <div className="card-premium p-4 text-center">
                                    <p className="metric-value text-2xl text-gold">{report.total_assets || 0}</p>
                                    <p className="text-xs text-stone">Assets</p>
                                </div>
                                <div className="card-premium p-4 text-center">
                                    <p className="metric-value text-2xl text-orange">{report.fully_financeable || 0}</p>
                                    <p className="text-xs text-stone">Financeable</p>
                                </div>
                                <div className="card-premium p-4 text-center">
                                    <p className="metric-value text-2xl text-warm-white">{report.buyer_ready || 0}</p>
                                    <p className="text-xs text-stone">Buyer Ready</p>
                                </div>
                                <div className="card-premium p-4 text-center">
                                    <p className="metric-value text-2xl text-crimson">{report.blockers?.length || 0}</p>
                                    <p className="text-xs text-stone">Blockers</p>
                                </div>
                            </div>

                            {report.improvement_queue?.length > 0 && (
                                <div className="card-premium p-6">
                                    <h3 className="text-lg font-semibold mb-4 text-orange">Improvement Queue</h3>
                                    <div className="space-y-2">
                                        {report.improvement_queue.map((item, i) => (
                                            <div key={i} className="flex items-center justify-between p-3 bg-graphite/30 rounded">
                                                <div>
                                                    <p className="font-mono text-sm text-warm-white">{item.asset_id}</p>
                                                    <p className="text-stone text-xs">{item.action} • Impact: {item.impact}</p>
                                                </div>
                                                <span className="badge badge-undervalued">{item.priority}</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {audit.assets?.length > 0 && (
                                <div className="card-premium p-6">
                                    <h3 className="text-lg font-semibold mb-4 text-orange">Asset Summary</h3>
                                    <div className="space-y-2">
                                        {audit.assets.map((a, i) => (
                                            <div key={i} className="flex items-center justify-between p-3 bg-graphite/30 rounded">
                                                <span className="font-mono text-sm">{a.asset_id}</span>
                                                <div className="flex gap-2">
                                                    {a.financeable && <span className="badge badge-verified">Financeable</span>}
                                                    {a.buyer_ready && <span className="badge badge-verified">Buyer Ready</span>}
                                                    <span className="badge badge-undervalued">{a.production_grade || 'N/A'}</span>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        }

        // Competency Graph View
        function CompetencyGraphView() {
            const [jobText, setJobText] = useState('');
            const [parsed, setParsed] = useState(null);
            const [loading, setLoading] = useState(false);

            async function parseJob() {
                if (!jobText.trim()) return;
                setLoading(true);
                await new Promise(r => setTimeout(r, 800));
                const text = jobText.toLowerCase();
                const skills = [];
                const skillMap = {
                    'python': 'Python', 'javascript': 'JavaScript', 'typescript': 'TypeScript',
                    'react': 'React', 'node': 'Node.js', 'docker': 'Docker', 'kubernetes': 'Kubernetes',
                    'aws': 'AWS', 'gcp': 'GCP', 'azure': 'Azure', 'sql': 'SQL', 'postgres': 'PostgreSQL',
                    'redis': 'Redis', 'kafka': 'Kafka', 'graphql': 'GraphQL', 'rest': 'REST API',
                    'ci/cd': 'CI/CD', 'terraform': 'Terraform', 'machine learning': 'ML/AI',
                    'llm': 'LLMs', 'data engineering': 'Data Engineering', 'security': 'Security'
                };
                Object.entries(skillMap).forEach(([key, val]) => {
                    if (text.includes(key)) skills.push(val);
                });
                const levels = ['junior', 'mid', 'senior', 'staff', 'principal', 'lead'];
                const level = levels.find(l => text.includes(l)) || 'unspecified';
                setParsed({ skills, level, raw: jobText.length });
                setLoading(false);
            }

            return (
                <div className="max-w-7xl mx-auto px-6 py-8">
                    <h2 className="text-3xl font-bold mb-2 text-gold">Competency Graph</h2>
                    <p className="text-stone mb-6">Extract competency signals from job descriptions to map the talent landscape.</p>

                    <div className="card-premium p-6 mb-6">
                        <label className="text-stone text-xs uppercase tracking-wider mb-2 block">Job Description</label>
                        <textarea value={jobText} onChange={e => setJobText(e.target.value)} rows={8} placeholder="Paste a job description here to extract competencies, skills, and seniority signals..." className="w-full bg-graphite border border-orange/20 rounded-lg px-4 py-3 text-warm-white text-sm mb-3" />
                        <button onClick={parseJob} disabled={loading} className="px-6 py-3 bg-orange/20 border border-orange/30 text-orange rounded-lg hover:bg-orange/30 disabled:opacity-50 transition-all">{loading ? 'Parsing...' : 'Extract Competencies'}</button>
                    </div>

                    {parsed && (
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div className="card-premium p-6">
                                <h3 className="text-lg font-semibold mb-3 text-orange">Extracted Skills ({parsed.skills.length})</h3>
                                {parsed.skills.length > 0 ? (
                                    <div className="flex flex-wrap gap-2">
                                        {parsed.skills.map((s, i) => <span key={i} className="badge badge-verified">{s}</span>)}
                                    </div>
                                ) : <p className="text-stone text-sm">No known skills detected.</p>}
                            </div>
                            <div className="card-premium p-6">
                                <h3 className="text-lg font-semibold mb-3 text-orange">Seniority Signal</h3>
                                <p className="text-warm-white font-mono text-lg capitalize">{parsed.level}</p>
                                <p className="text-stone text-xs mt-2">{parsed.raw} characters analyzed</p>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // Live View
        function LiveView() {
            const [events, setEvents] = useState([]);
            const [metrics, setMetrics] = useState(null);
            const [recentInterventions, setRecentInterventions] = useState([]);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [lastUpdate, setLastUpdate] = useState(null);

            async function pollData() {
                try {
                    const now = new Date();
                    const timeStr = now.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });

                    const [mRes, iRes] = await Promise.all([
                        fetch(`${API_BASE_URL}/api/metrics`, { cache: 'no-store' }),
                        fetch(`${API_BASE_URL}/api/interventions?limit=5`, { cache: 'no-store' })
                    ]);

                    const newEvents = [];
                    if (mRes.ok) {
                        const m = await mRes.json();
                        setMetrics(m);
                        newEvents.push({ time: timeStr, msg: `System healthy • ${m.verifiedInterventions || 0} verified • ${m.assetsUnderWatch || 0} assets watched`, type: 'ok' });
                    }
                    if (iRes.ok) {
                        const i = await iRes.json();
                        setRecentInterventions(i.records || []);
                        if (i.count > 0) {
                            const latest = i.records[0];
                            newEvents.push({ time: timeStr, msg: `Latest: ${latest.asset_id} • ${latest.intervention_type} • ${latest.status}`, type: 'info' });
                        }
                    }

                    setEvents(prev => {
                        const combined = [...newEvents, ...prev].slice(0, 100);
                        return combined;
                    });
                    setLastUpdate(now);
                    setError(null);
                } catch (err) {
                    setError(err.message);
                    setEvents(prev => [{ time: new Date().toLocaleTimeString('en-US', { hour12: false }), msg: `Poll error: ${err.message}`, type: 'error' }, ...prev].slice(0, 100));
                } finally {
                    setLoading(false);
                }
            }

            useEffect(() => {
                pollData();
                const interval = setInterval(pollData, 10000);
                return () => clearInterval(interval);
            }, []);

            return (
                <div className="max-w-7xl mx-auto px-6 py-8">
                    <div className="flex items-center justify-between mb-6">
                        <div>
                            <h2 className="text-3xl font-bold text-orange">Live Activity</h2>
                            <p className="text-stone">Real-time system telemetry • Updates every 10s</p>
                        </div>
                        <div className="flex items-center gap-2">
                            <span className="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                            <span className="text-stone text-sm">{lastUpdate ? `Updated ${lastUpdate.toLocaleTimeString()}` : 'Connecting...'}</span>
                        </div>
                    </div>

                    {metrics && (
                        <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">
                            <div className="card-premium p-4 text-center">
                                <p className="metric-value text-2xl text-gold">{metrics.verifiedInterventions?.toLocaleString()}</p>
                                <p className="text-xs text-stone">Verified</p>
                            </div>
                            <div className="card-premium p-4 text-center">
                                <p className="metric-value text-2xl text-orange">{metrics.hiddenInfrastructure?.toLocaleString()}</p>
                                <p className="text-xs text-stone">Hidden Infra</p>
                            </div>
                            <div className="card-premium p-4 text-center">
                                <p className="metric-value text-2xl text-warm-white">{metrics.transformationLaws?.toLocaleString()}</p>
                                <p className="text-xs text-stone">Transform Laws</p>
                            </div>
                            <div className="card-premium p-4 text-center">
                                <p className="metric-value text-2xl text-blue-400">{metrics.assetsUnderWatch?.toLocaleString()}</p>
                                <p className="text-xs text-stone">Assets Watch</p>
                            </div>
                        </div>
                    )}

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <div>
                            <h3 className="text-sm font-medium text-orange mb-3 uppercase tracking-wider">Event Log</h3>
                            <TerminalLog lines={events} />
                            {error && <p className="text-crimson text-xs mt-2">{error}</p>}
                        </div>
                        <div>
                            <h3 className="text-sm font-medium text-orange mb-3 uppercase tracking-wider">Recent Interventions</h3>
                            <div className="space-y-2 max-h-[60vh] overflow-y-auto">
                                {recentInterventions.map((item, i) => (
                                    <div key={i} className="card-premium p-3">
                                        <div className="flex items-center justify-between">
                                            <span className="font-mono text-xs text-warm-white">{item.asset_id}</span>
                                            <span className={`badge ${item.status==='verified'?'badge-verified':item.status==='failed'?'badge-risk':'badge-undervalued'}`}>{item.status}</span>
                                        </div>
                                        <p className="text-stone text-xs mt-1">{item.intervention_type} • ${item.predicted_value?.toLocaleString()} • {item.planned_effort_days}d</p>
                                    </div>
                                ))}
                                {recentInterventions.length === 0 && !loading && (
                                    <p className="text-stone text-sm">No recent interventions.</p>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // Access Denied View
        function AccessDeniedView() {
            return (
                <div className="max-w-7xl mx-auto px-6 py-8">
                    <div className="card-premium p-12 text-center">
                        <div className="w-16 h-16 mx-auto mb-4 rounded-full bg-crimson/20 flex items-center justify-center">
                            <svg className="w-8 h-8 text-crimson" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                            </svg>
                        </div>
                        <h2 className="text-2xl font-bold text-crimson mb-2">Access Denied</h2>
                        <p className="text-stone mb-6">This page requires a higher tier subscription.</p>
                        <div className="space-y-2 text-sm text-stone">
                            <p><span className="text-orange font-medium">Radar Tier (Public):</span> Radar, Alpha, Search, Swipe, Live</p>
                            <p><span className="text-orange font-medium">Underwriter Tier (Professional):</span> Underwriter, Asset Desk, Review Cards, Portfolio</p>
                            <p><span className="text-orange font-medium">Mine Tier (Admin):</span> Mine, Interventions, Ledger, Competency</p>
                        </div>
                        <button 
                            onClick={() => window.location.href = '/login'}
                            className="mt-6 px-6 py-2 bg-orange/20 border border-orange/30 text-orange rounded hover:bg-orange/30 transition-all"
                        >
                            Login to Upgrade
                        </button>
                    </div>
                </div>
            );
        }

        // Main App
        function App() {
            const [currentView, setCurrentView] = useState('radar');
            const [userRole, setUserRole] = useState(null);
            const [userLoading, setUserLoading] = useState(true);
            const views = ['radar','alpha','search','swipe','underwriter','asset-desk','review-cards','portfolio','mine','interventions','ledger','competency','live'];

            // Fetch user role on mount
            useEffect(() => {
                async function fetchUserRole() {
                    const token = getToken();
                    if (token) {
                        try {
                            const res = await fetch(`${API_BASE_URL}/api/user`, {
                                headers: { 'Authorization': `Bearer ${token}` }
                            });
                            const data = await res.json();
                            if (data.authenticated) {
                                setUserRole(data.role);
                            }
                        } catch (err) {
                            console.error('Failed to fetch user role:', err);
                        }
                    }
                    setUserLoading(false);
                }
                fetchUserRole();
            }, []);

            useEffect(() => {
                function onKey(e) {
                    const idx = parseInt(e.key);
                    if (idx >= 1 && idx <= views.length) { setCurrentView(views[idx-1]); e.preventDefault(); }
                }
                window.addEventListener('keydown', onKey);
                return () => window.removeEventListener('keydown', onKey);
            }, []);

            // Check if user can access current view
            const canAccessView = (view) => {
                if (!userRole) return view === 'radar' || view === 'alpha' || view === 'search' || view === 'swipe' || view === 'live';
                
                const radarPages = ['radar', 'alpha', 'search', 'swipe', 'live'];
                const underwriterPages = ['underwriter', 'asset-desk', 'review-cards', 'portfolio'];
                const minePages = ['mine', 'interventions', 'ledger', 'competency'];
                
                if (radarPages.includes(view)) return true;
                if (underwriterPages.includes(view)) return userRole === 'professional' || userRole === 'admin';
                if (minePages.includes(view)) return userRole === 'admin';
                
                return false;
            };

            // Redirect if user cannot access current view
            useEffect(() => {
                if (!userLoading && userRole && !canAccessView(currentView)) {
                    setCurrentView('radar');
                }
            }, [currentView, userRole, userLoading]);

            return (
                <div className="min-h-screen flex flex-col">
                    <Header currentView={currentView} setCurrentView={setCurrentView} userRole={userRole} />
                    <main className="flex-1">
                        {currentView === 'radar' && <RadarView />}
                        {currentView === 'alpha' && <AlphaView />}
                        {currentView === 'search' && <SearchView />}
                        {currentView === 'swipe' && <SwipeView />}
                        {currentView === 'underwriter' && (canAccessView('underwriter') ? <UnderwriterView /> : <AccessDeniedView />)}
                        {currentView === 'asset-desk' && (canAccessView('asset-desk') ? <AssetDeskView /> : <AccessDeniedView />)}
                        {currentView === 'review-cards' && (canAccessView('review-cards') ? <ReviewCardsView /> : <AccessDeniedView />)}
                        {currentView === 'portfolio' && (canAccessView('portfolio') ? <PortfolioView /> : <AccessDeniedView />)}
                        {currentView === 'mine' && (canAccessView('mine') ? <MineView /> : <AccessDeniedView />)}
                        {currentView === 'interventions' && (canAccessView('interventions') ? <InterventionView /> : <AccessDeniedView />)}
                        {currentView === 'ledger' && (canAccessView('ledger') ? <LedgerView /> : <AccessDeniedView />)}
                        {currentView === 'competency' && (canAccessView('competency') ? <CompetencyGraphView /> : <AccessDeniedView />)}
                        {currentView === 'live' && <LiveView />}
                    </main>
                    <footer className="border-t border-orange/10 py-4 px-6">
                        <div className="max-w-7xl mx-auto flex flex-wrap justify-between items-center gap-2 text-xs text-stone">
                            <p>
                                <span className="text-orange font-medium">Catacomb</span> — Innovation Allocation & Asset Underwriting Engine
                            </p>
                            <p>
                                Predictions are informational. No guaranteed value creation. Not investment advice.
                                Professional review cards are draft appraisals. Human review recommended.
                            </p>
                        </div>
                    </footer>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
