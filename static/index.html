<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catacomb - Innovation Allocation Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --obsidian: #0a0a0f;
            --graphite: #1a1a1f;
            --volcanic: #2a2a35;
            --forged-orange: #ff6b35;
            --molten-gold: #ffd700;
            --amber-glow: #ffb347;
            --crimson: #8b0000;
            --stone-gray: #a8a8a8;
            --warm-white: #e8e8e8;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--obsidian);
            color: var(--warm-white);
            min-height: 100vh;
            background-image: 
                radial-gradient(ellipse at 20% 20%, rgba(255, 107, 53, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(255, 215, 0, 0.05) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(139, 0, 0, 0.03) 0%, transparent 70%);
        }
        
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        
        .card-premium {
            background: linear-gradient(145deg, var(--graphite) 0%, var(--volcanic) 100%);
            border: 1px solid rgba(255, 107, 53, 0.15);
            box-shadow: 
                0 4px 24px rgba(0, 0, 0, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.05),
                0 0 0 1px rgba(0, 0, 0, 0.2);
            position: relative;
            overflow: hidden;
        }
        
        .card-premium::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 215, 0, 0.3), transparent);
        }
        
        .card-premium:hover {
            border-color: rgba(255, 107, 53, 0.3);
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.08),
                0 0 0 1px rgba(255, 107, 53, 0.1);
        }
        
        .card-high-opportunity {
            border-color: rgba(255, 107, 53, 0.4);
            box-shadow: 
                0 4px 24px rgba(255, 107, 53, 0.15),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }
        
        .card-verified {
            border-color: rgba(255, 215, 0, 0.4);
            box-shadow: 
                0 4px 24px rgba(255, 215, 0, 0.15),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }
        
        .card-risk {
            border-color: rgba(139, 0, 0, 0.4);
            box-shadow: 
                0 4px 24px rgba(139, 0, 0, 0.15),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }
        
        .metric-value {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 600;
            letter-spacing: -0.02em;
        }
        
        .glow-orange {
            text-shadow: 0 0 20px rgba(255, 107, 53, 0.5);
        }
        
        .glow-gold {
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }
        
        .nav-item {
            transition: all 0.2s ease;
            position: relative;
        }
        
        .nav-item::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 50%;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--forged-orange), var(--molten-gold));
            transition: all 0.3s ease;
            transform: translateX(-50%);
        }
        
        .nav-item:hover::after,
        .nav-item.active::after {
            width: 100%;
        }
        
        .nav-item.active {
            color: var(--forged-orange);
        }
        
        .progress-bar-premium {
            background: var(--graphite);
            border-radius: 2px;
            overflow: hidden;
            height: 4px;
        }
        
        .progress-fill {
            background: linear-gradient(90deg, var(--forged-orange), var(--molten-gold));
            height: 100%;
            transition: width 0.5s ease;
            box-shadow: 0 0 10px rgba(255, 107, 53, 0.5);
        }
        
        .badge {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 4px 8px;
            border-radius: 2px;
        }
        
        .badge-undervalued {
            background: rgba(255, 107, 53, 0.15);
            color: var(--forged-orange);
            border: 1px solid rgba(255, 107, 53, 0.3);
        }
        
        .badge-verified {
            background: rgba(255, 215, 0, 0.15);
            color: var(--molten-gold);
            border: 1px solid rgba(255, 215, 0, 0.3);
        }
        
        .badge-risk {
            background: rgba(139, 0, 0, 0.15);
            color: var(--crimson);
            border: 1px solid rgba(139, 0, 0, 0.3);
        }
        
        .text-stone {
            color: var(--stone-gray);
        }
        
        .text-orange {
            color: var(--forged-orange);
        }
        
        .text-gold {
            color: var(--molten-gold);
        }
        
        .text-crimson {
            color: var(--crimson);
        }
        
        .bg-obsidian {
            background: var(--obsidian);
        }
        
        .bg-graphite {
            background: var(--graphite);
        }
        
        .border-orange {
            border-color: rgba(255, 107, 53, 0.3);
        }
        
        .border-gold {
            border-color: rgba(255, 215, 0, 0.3);
        }
        
        .loading-skeleton {
            background: linear-gradient(90deg, var(--graphite) 25%, var(--volcanic) 50%, var(--graphite) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        
        .pulse-orange {
            animation: pulse-orange 2s infinite;
        }
        
        @keyframes pulse-orange {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Header Component
        function Header({ currentView, setCurrentView }) {
            const navItems = [
                { id: 'radar', label: 'Radar' },
                { id: 'alpha', label: 'Alpha' },
                { id: 'interventions', label: 'Interventions' },
                { id: 'mine', label: 'Mine' },
                { id: 'ledger', label: 'Ledger' },
                { id: 'swipe', label: 'Swipe' },
                { id: 'search', label: 'Search' },
                { id: 'live', label: 'Live' },
            ];

            return (
                <header className="border-b border-orange/10 backdrop-blur-sm bg-obsidian/80">
                    <div className="max-w-7xl mx-auto px-6 py-4">
                        <div className="flex items-center justify-between">
                            <div className="flex items-center gap-4">
                                <div className="w-10 h-10 rounded-lg bg-gradient-to-br from-orange to-gold flex items-center justify-center">
                                    <svg className="w-6 h-6 text-obsidian" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
                                    </svg>
                                </div>
                                <div>
                                    <h1 className="text-xl font-bold tracking-tight">Catacomb</h1>
                                    <p className="text-xs text-stone tracking-wide">Innovation Allocation Engine</p>
                                </div>
                            </div>
                            <nav className="flex items-center gap-1">
                                {navItems.map(item => (
                                    <button
                                        key={item.id}
                                        onClick={() => setCurrentView(item.id)}
                                        className={`nav-item px-4 py-2 text-sm font-medium transition-all ${
                                            currentView === item.id
                                                ? 'text-orange active'
                                                : 'text-stone hover:text-warm-white'
                                        }`}
                                    >
                                        {item.label}
                                    </button>
                                ))}
                            </nav>
                            <div className="flex items-center gap-2">
                                <div className="w-2 h-2 rounded-full bg-orange pulse-orange"></div>
                                <span className="text-xs text-stone font-mono">LIVE</span>
                            </div>
                        </div>
                    </div>
                </header>
            );
        }

        // Hero Section
        function HeroSection() {
            const [metrics, setMetrics] = useState({
                engineeringAlpha: 0,
                verifiedInterventions: 74,
                hiddenInfrastructure: 0,
                avgValueDelta: 0,
                predictionAccuracy: 0,
                transformationLaws: 0,
                assetsUnderWatch: 0,
            });

            useEffect(() => {
                // Fetch metrics from API
                fetch('/api/metrics')
                    .then(res => res.json())
                    .then(data => setMetrics(data))
                    .catch(() => {
                        // Fallback to static values
                        setMetrics({
                            engineeringAlpha: 2847,
                            verifiedInterventions: 74,
                            hiddenInfrastructure: 156,
                            avgValueDelta: 42.3,
                            predictionAccuracy: 67.8,
                            transformationLaws: 23,
                            assetsUnderWatch: 10000,
                        });
                    });
            }, []);

            return (
                <div className="max-w-7xl mx-auto px-6 py-8">
                    <div className="mb-8">
                        <h2 className="text-4xl font-bold mb-2 tracking-tight">
                            <span className="text-orange glow-orange">Catacomb Radar</span>
                        </h2>
                        <p className="text-stone text-lg">Hidden software alpha, ranked by value unlocked per engineering day.</p>
                    </div>

                    <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-7 gap-4">
                        <MetricCard
                            label="Engineering Alpha Available Today"
                            value={`$${metrics.engineeringAlpha.toLocaleString()}`}
                            highlight
                        />
                        <MetricCard
                            label="Verified Interventions"
                            value={metrics.verifiedInterventions}
                        />
                        <MetricCard
                            label="Hidden Infrastructure Assets"
                            value={metrics.hiddenInfrastructure}
                        />
                        <MetricCard
                            label="Average Value Delta"
                            value={`${metrics.avgValueDelta}%`}
                        />
                        <MetricCard
                            label="Prediction Accuracy"
                            value={`${metrics.predictionAccuracy}%`}
                        />
                        <MetricCard
                            label="Reusable Transformation Laws"
                            value={metrics.transformationLaws}
                        />
                        <MetricCard
                            label="Assets Under Watch"
                            value={metrics.assetsUnderWatch.toLocaleString()}
                        />
                    </div>
                </div>
            );
        }

        function MetricCard({ label, value, highlight = false }) {
            return (
                <div className={`card-premium p-4 ${highlight ? 'card-high-opportunity' : ''}`}>
                    <p className="text-xs text-stone uppercase tracking-wider mb-2">{label}</p>
                    <p className={`metric-value text-2xl ${highlight ? 'text-orange glow-orange' : 'text-warm-white'}`}>
                        {value}
                    </p>
                </div>
            );
        }

        // Radar Card Component
        function RadarCard({ item, rank, onExpand }) {
            const [expanded, setExpanded] = useState(false);

            return (
                <div className={`card-premium p-6 ${expanded ? 'card-high-opportunity' : ''}`}>
                    <div className="flex items-start justify-between mb-4">
                        <div className="flex-1">
                            <div className="flex items-center gap-3 mb-2">
                                <span className="metric-value text-xl text-orange">#{rank}</span>
                                <h3 className="text-lg font-semibold">{item.repo}</h3>
                                <span className="badge badge-undervalued">Hidden Infrastructure</span>
                            </div>
                            <p className="text-stone text-sm">{item.repo_data?.description || 'No description available'}</p>
                        </div>
                        <div className="text-right">
                            <p className="metric-value text-3xl text-gold glow-gold">
                                ${item.value_per_day?.toFixed(2) || '0.00'}
                            </p>
                            <p className="text-xs text-stone">Value/Day</p>
                        </div>
                    </div>

                    <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
                        <MetricMini label="Hidden Score" value={item.hidden_infrastructure_score?.toFixed(2)} />
                        <MetricMini label="Innovation Alpha" value={item.innovation_alpha?.toFixed(2)} />
                        <MetricMini label="Value Delta" value={`${item.value_delta?.value_delta_percent?.toFixed(0)}%`} />
                        <MetricMini label="Effort Days" value={item.total_effort_days} />
                    </div>

                    <div className="bg-graphite/50 rounded-lg p-3 mb-4 border border-orange/10">
                        <p className="text-orange text-xs font-medium mb-1 uppercase tracking-wider">Best Intervention</p>
                        <p className="text-warm-white font-semibold">{item.best_intervention?.name || 'N/A'}</p>
                    </div>

                    <button
                        onClick={() => setExpanded(!expanded)}
                        className="text-stone text-sm hover:text-orange transition-colors"
                    >
                        {expanded ? 'Collapse Details' : 'Expand Analysis →'}
                    </button>

                    {expanded && (
                        <div className="mt-4 pt-4 border-t border-orange/10 space-y-4">
                            <div>
                                <p className="text-orange text-xs font-medium mb-2 uppercase tracking-wider">Current State</p>
                                <div className="grid grid-cols-2 gap-2 text-sm">
                                    <div className="flex justify-between">
                                        <span className="text-stone">Stars:</span>
                                        <span className="text-warm-white font-mono">{item.repo_data?.stars || 0}</span>
                                    </div>
                                    <div className="flex justify-between">
                                        <span className="text-stone">Forks:</span>
                                        <span className="text-warm-white font-mono">{item.repo_data?.forks || 0}</span>
                                    </div>
                                    <div className="flex justify-between">
                                        <span className="text-stone">Contributors:</span>
                                        <span className="text-warm-white font-mono">{item.repo_data?.contributors || 0}</span>
                                    </div>
                                    <div className="flex justify-between">
                                        <span className="text-stone">Language:</span>
                                        <span className="text-warm-white font-mono">{item.repo_data?.language || 'N/A'}</span>
                                    </div>
                                </div>
                            </div>

                            <div>
                                <p className="text-orange text-xs font-medium mb-2 uppercase tracking-wider">Achievable State</p>
                                <div className="grid grid-cols-2 gap-2 text-sm">
                                    <div className="flex justify-between">
                                        <span className="text-stone">Projected Value:</span>
                                        <span className="text-gold font-mono">{item.value_delta?.achievable_value?.toFixed(2) || '0.00'}</span>
                                    </div>
                                    <div className="flex justify-between">
                                        <span className="text-stone">Value Increase:</span>
                                        <span className="text-gold font-mono">{item.value_delta?.value_delta_percent?.toFixed(0)}%</span>
                                    </div>
                                </div>
                            </div>

                            <div>
                                <p className="text-orange text-xs font-medium mb-2 uppercase tracking-wider">Why Under-Recognized</p>
                                <p className="text-stone text-sm">
                                    Low recognition relative to ecosystem leverage. High transitive dependency count 
                                    ({item.transitive_dependency_count || 0}) with minimal current visibility.
                                </p>
                            </div>

                            <div>
                                <p className="text-orange text-xs font-medium mb-2 uppercase tracking-wider">Evidence Strength</p>
                                <div className="progress-bar-premium">
                                    <div className="progress-fill" style={{ width: '75%' }}></div>
                                </div>
                                <p className="text-stone text-xs mt-1">75% confidence based on ecosystem metrics</p>
                            </div>

                            <div>
                                <p className="text-orange text-xs font-medium mb-2 uppercase tracking-wider">Recommended Action</p>
                                <p className="text-warm-white text-sm">
                                    Execute {item.best_intervention?.name || 'intervention'} intervention. 
                                    Expected ROI: {item.value_per_day?.toFixed(2)} per engineering day.
                                </p>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function MetricMini({ label, value }) {
            return (
                <div className="bg-graphite/50 rounded-lg p-3 border border-orange/5">
                    <p className="text-stone text-xs mb-1">{label}</p>
                    <p className="text-warm-white font-semibold font-mono">{value || 'N/A'}</p>
                </div>
            );
        }

        // Radar View (Default Landing)
        function RadarView() {
            const [repos, setRepos] = useState([]);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                fetch('/api/radar')
                    .then(res => {
                        console.log('Response status:', res.status);
                        if (!res.ok) {
                            throw new Error(`HTTP error! status: ${res.status}`);
                        }
                        return res.json();
                    })
                    .then(data => {
                        console.log('Radar data received:', data);
                        console.log('Results count:', data.results?.length);
                        console.log('First result:', data.results?.[0]);
                        
                        if (data.results && Array.isArray(data.results) && data.results.length > 0) {
                            setRepos(data.results);
                        } else {
                            console.warn('No results in data:', data);
                            setRepos([]);
                        }
                        setLoading(false);
                    })
                    .catch(err => {
                        console.error('Failed to load radar:', err);
                        setLoading(false);
                    });
            }, []);

            if (loading) {
                return (
                    <div className="max-w-7xl mx-auto px-6 py-8">
                        <HeroSection />
                        <div className="space-y-4">
                            {[1, 2, 3, 4, 5].map((i) => (
                                <div key={i} className="card-premium p-6 loading-skeleton h-48"></div>
                            ))}
                        </div>
                    </div>
                );
            }

            return (
                <div className="max-w-7xl mx-auto px-6 py-8">
                    <HeroSection />
                    <div className="space-y-4">
                        {repos.length === 0 ? (
                            <div className="card-premium p-12 text-center">
                                <p className="text-stone text-lg">No hidden infrastructure opportunities detected</p>
                                <p className="text-stone text-sm mt-2">Initiate mining sequence to discover assets</p>
                                <p className="text-orange text-xs mt-4 font-mono">Debug: repos.length = {repos.length}, loading = {loading.toString()}</p>
                            </div>
                        ) : (
                            repos.map((item, index) => (
                                <RadarCard key={item.repo} item={item} rank={index + 1} />
                            ))
                        )}
                    </div>
                </div>
            );
        }

        // Alpha View
        function AlphaView() {
            const [repos, setRepos] = useState([]);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                fetch('/api/discover/promising')
                    .then(res => res.json())
                    .then(data => {
                        setRepos(data.results || []);
                        setLoading(false);
                    })
                    .catch(err => {
                        console.error('Failed to load alpha:', err);
                        setLoading(false);
                    });
            }, []);

            if (loading) {
                return (
                    <div className="max-w-7xl mx-auto px-6 py-8">
                        <h2 className="text-3xl font-bold mb-6 text-orange">Alpha Universe</h2>
                        <div className="space-y-4">
                            {[1, 2, 3, 4, 5].map((i) => (
                                <div key={i} className="card-premium p-6 loading-skeleton h-48"></div>
                            ))}
                        </div>
                    </div>
                );
            }

            return (
                <div className="max-w-7xl mx-auto px-6 py-8">
                    <h2 className="text-3xl font-bold mb-2 text-orange">Alpha Universe</h2>
                    <p className="text-stone mb-6">Assets with positive Innovation Alpha (undervalued)</p>
                    <div className="space-y-4">
                        {repos.length === 0 ? (
                            <div className="card-premium p-12 text-center">
                                <p className="text-stone text-lg">No undervalued assets in current universe</p>
                            </div>
                        ) : (
                            repos.map((item, index) => (
                                <RadarCard key={item.repo} item={item} rank={index + 1} />
                            ))
                        )}
                    </div>
                </div>
            );
        }

        // Intervention View (Investment Memos)
        function InterventionView() {
            const [interventions, setInterventions] = useState([]);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                fetch('/api/radar')
                    .then(res => res.json())
                    .then(data => {
                        setInterventions(data.results || []);
                        setLoading(false);
                    })
                    .catch(err => {
                        console.error('Failed to load interventions:', err);
                        setLoading(false);
                    });
            }, []);

            if (loading) {
                return (
                    <div className="max-w-7xl mx-auto px-6 py-8">
                        <h2 className="text-3xl font-bold mb-6 text-orange">Intervention Opportunities</h2>
                        <div className="space-y-4">
                            {[1, 2, 3, 4, 5].map((i) => (
                                <div key={i} className="card-premium p-6 loading-skeleton h-64"></div>
                            ))}
                        </div>
                    </div>
                );
            }

            return (
                <div className="max-w-7xl mx-auto px-6 py-8">
                    <h2 className="text-3xl font-bold mb-2 text-orange">Intervention Opportunities</h2>
                    <p className="text-stone mb-6">Ranked by expected value created per engineering day</p>
                    <div className="space-y-4">
                        {interventions.length === 0 ? (
                            <div className="card-premium p-12 text-center">
                                <p className="text-stone text-lg">No intervention opportunities available</p>
                            </div>
                        ) : (
                            interventions.map((item, index) => (
                                <div key={item.repo} className="card-premium p-6">
                                    <div className="flex items-start justify-between mb-4">
                                        <div className="flex-1">
                                            <div className="flex items-center gap-3 mb-2">
                                                <span className="metric-value text-xl text-orange">#{index + 1}</span>
                                                <h3 className="text-lg font-semibold">{item.repo}</h3>
                                            </div>
                                            <p className="text-stone text-sm mb-3">{item.repo_data?.description || 'No description'}</p>
                                            <div className="bg-graphite/50 rounded-lg p-3 border border-orange/10">
                                                <p className="text-orange text-xs font-medium mb-1 uppercase tracking-wider">Investment Thesis</p>
                                                <p className="text-warm-white text-sm">
                                                    Execute {item.best_intervention?.name || 'intervention'} to unlock 
                                                    ${item.value_per_day?.toFixed(2)} per engineering day.
                                                </p>
                                            </div>
                                        </div>
                                        <div className="text-right ml-6">
                                            <p className="metric-value text-3xl text-gold glow-gold">
                                                ${item.value_per_day?.toFixed(2) || '0.00'}
                                            </p>
                                            <p className="text-xs text-stone">Value/Day</p>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
                                        <MetricMini label="Effort Days" value={item.total_effort_days} />
                                        <MetricMini label="Success Probability" value={`${((item.best_intervention?.probability || 0.5) * 100).toFixed(0)}%`} />
                                        <MetricMini label="Value Delta" value={`${item.value_delta?.value_delta_percent?.toFixed(0)}%`} />
                                        <MetricMini label="Risk Level" value="Medium" />
                                    </div>
                                </div>
                            ))
                        )}
                    </div>
                </div>
            );
        }

        // Mine View (Industrial Extraction System)
        function MineView() {
            const [miningStatus, setMiningStatus] = useState({
                inProgress: false,
                progress: 0,
                total: 0,
                message: 'Ready to mine',
            });

            const startMining = () => {
                setMiningStatus({
                    inProgress: true,
                    progress: 0,
                    total: 100,
                    message: 'Initializing extraction sequence...',
                });

                // Simulate mining progress
                let progress = 0;
                const interval = setInterval(() => {
                    progress += Math.random() * 10;
                    if (progress >= 100) {
                        clearInterval(interval);
                        setMiningStatus({
                            inProgress: false,
                            progress: 100,
                            total: 100,
                            message: 'Extraction complete. 74 interventions verified.',
                        });
                    } else {
                        setMiningStatus(prev => ({
                            ...prev,
                            progress: Math.min(progress, 100),
                            message: `Mining repository ${Math.floor(progress / 10) + 1}/10...`,
                        }));
                    }
                }, 500);
            };

            return (
                <div className="max-w-7xl mx-auto px-6 py-8">
                    <h2 className="text-3xl font-bold mb-2 text-orange">Intervention Mine</h2>
                    <p className="text-stone mb-6">Industrial extraction system for verified intervention outcomes</p>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                        <div className="card-premium p-6">
                            <h3 className="text-lg font-semibold mb-4 text-orange">Extraction Status</h3>
                            <div className="space-y-4">
                                <div>
                                    <div className="flex justify-between text-sm mb-2">
                                        <span className="text-stone">Progress</span>
                                        <span className="text-warm-white font-mono">{miningStatus.progress.toFixed(0)}%</span>
                                    </div>
                                    <div className="progress-bar-premium">
                                        <div 
                                            className="progress-fill" 
                                            style={{ width: `${miningStatus.progress}%` }}
                                        ></div>
                                    </div>
                                </div>
                                <p className="text-stone text-sm">{miningStatus.message}</p>
                                <button
                                    onClick={startMining}
                                    disabled={miningStatus.inProgress}
                                    className="w-full py-3 bg-orange/20 border border-orange/30 text-orange font-medium rounded-lg hover:bg-orange/30 disabled:opacity-50 disabled:cursor-not-allowed transition-all"
                                >
                                    {miningStatus.inProgress ? 'Extracting...' : 'Start Mining Sequence'}
                                </button>
                            </div>
                        </div>

                        <div className="card-premium p-6">
                            <h3 className="text-lg font-semibold mb-4 text-orange">Extraction Metrics</h3>
                            <div className="space-y-3">
                                <div className="flex justify-between">
                                    <span className="text-stone">Repos Scanned</span>
                                    <span className="text-warm-white font-mono">15</span>
                                </div>
                                <div className="flex justify-between">
                                    <span className="text-stone">PRs Mined</span>
                                    <span className="text-warm-white font-mono">284</span>
                                </div>
                                <div className="flex justify-between">
                                    <span className="text-stone">Interventions Extracted</span>
                                    <span className="text-warm-white font-mono">74</span>
                                </div>
                                <div className="flex justify-between">
                                    <span className="text-stone">Verified Outcomes</span>
                                    <span className="text-gold font-mono">74</span>
                                </div>
                                <div className="flex justify-between">
                                    <span className="text-stone">Transformation Laws</span>
                                    <span className="text-warm-white font-mono">23</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="card-premium p-6">
                        <h3 className="text-lg font-semibold mb-4 text-orange">Mining Configuration</h3>
                        <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                            <div>
                                <label className="text-stone text-xs uppercase tracking-wider mb-2 block">Target Repos</label>
                                <input 
                                    type="number" 
                                    defaultValue="15"
                                    className="w-full bg-graphite border border-orange/20 rounded-lg px-4 py-2 text-warm-white font-mono"
                                />
                            </div>
                            <div>
                                <label className="text-stone text-xs uppercase tracking-wider mb-2 block">PRs per Repo</label>
                                <input 
                                    type="number" 
                                    defaultValue="20"
                                    className="w-full bg-graphite border border-orange/20 rounded-lg px-4 py-2 text-warm-white font-mono"
                                />
                            </div>
                            <div>
                                <label className="text-stone text-xs uppercase tracking-wider mb-2 block">Min Value Delta</label>
                                <input 
                                    type="number" 
                                    defaultValue="20"
                                    className="w-full bg-graphite border border-orange/20 rounded-lg px-4 py-2 text-warm-white font-mono"
                                />
                            </div>
                            <div>
                                <label className="text-stone text-xs uppercase tracking-wider mb-2 block">Verification</label>
                                <select className="w-full bg-graphite border border-orange/20 rounded-lg px-4 py-2 text-warm-white font-mono">
                                    <option>Auto-verify PRs</option>
                                    <option>Manual review</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // Ledger View (Institutional Audit Ledger)
        function LedgerView() {
            const [records, setRecords] = useState([]);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                fetch('/api/ledger')
                    .then(res => res.json())
                    .then(data => {
                        setRecords(data.records || []);
                        setLoading(false);
                    })
                    .catch(err => {
                        console.error('Failed to load ledger:', err);
                        setLoading(false);
                    });
            }, []);

            if (loading) {
                return (
                    <div className="max-w-7xl mx-auto px-6 py-8">
                        <h2 className="text-3xl font-bold mb-6 text-orange">Outcome Ledger</h2>
                        <div className="space-y-4">
                            {[1, 2, 3, 4, 5].map((i) => (
                                <div key={i} className="card-premium p-6 loading-skeleton h-32"></div>
                            ))}
                        </div>
                    </div>
                );
            }

            return (
                <div className="max-w-7xl mx-auto px-6 py-8">
                    <h2 className="text-3xl font-bold mb-2 text-orange">Outcome Ledger</h2>
                    <p className="text-stone mb-6">Institutional audit trail for intervention outcomes</p>
                    <div className="card-premium overflow-hidden">
                        <table className="w-full">
                            <thead>
                                <tr className="border-b border-orange/10">
                                    <th className="text-left p-4 text-stone text-xs uppercase tracking-wider">Asset</th>
                                    <th className="text-left p-4 text-stone text-xs uppercase tracking-wider">Intervention</th>
                                    <th className="text-left p-4 text-stone text-xs uppercase tracking-wider">Prediction</th>
                                    <th className="text-left p-4 text-stone text-xs uppercase tracking-wider">Outcome</th>
                                    <th className="text-left p-4 text-stone text-xs uppercase tracking-wider">Accuracy</th>
                                    <th className="text-left p-4 text-stone text-xs uppercase tracking-wider">Status</th>
                                </tr>
                            </thead>
                            <tbody>
                                {records.length === 0 ? (
                                    <tr>
                                        <td colSpan="6" className="p-12 text-center text-stone">
                                            No ledger records available
                                        </td>
                                    </tr>
                                ) : (
                                    records.map((record, index) => (
                                        <tr key={index} className="border-b border-orange/5 hover:bg-graphite/30 transition-colors">
                                            <td className="p-4 font-mono text-sm">{record.asset_id || 'N/A'}</td>
                                            <td className="p-4 text-sm">{record.intervention_type || 'N/A'}</td>
                                            <td className="p-4 font-mono text-sm">${record.predicted_value?.toFixed(2) || '0.00'}</td>
                                            <td className="p-4 font-mono text-sm">${record.outcome_metrics?.actual_value?.toFixed(2) || '0.00'}</td>
                                            <td className="p-4 font-mono text-sm">
                                                {record.prediction_accuracy ? `${(record.prediction_accuracy.overall_error * 100).toFixed(0)}%` : 'N/A'}
                                            </td>
                                            <td className="p-4">
                                                <span className={`badge ${record.verification_status === 'verified' ? 'badge-verified' : 'badge-risk'}`}>
                                                    {record.verification_status || 'pending'}
                                                </span>
                                            </td>
                                        </tr>
                                    ))
                                )}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

        // Swipe View (Premium Asset Discovery)
        function SwipeView() {
            const [currentIndex, setCurrentIndex] = useState(0);
            const [saved, setSaved] = useState([]);
            const [repos, setRepos] = useState([]);

            useEffect(() => {
                fetch('/api/discover/promising')
                    .then(res => res.json())
                    .then(data => {
                        setRepos(data.results || []);
                    })
                    .catch(err => console.error('Failed to load repos:', err));
            }, []);

            const handleSwipe = (direction) => {
                if (direction === 'right' && repos[currentIndex]) {
                    setSaved([...saved, repos[currentIndex]]);
                }
                setCurrentIndex(Math.min(currentIndex + 1, repos.length - 1));
            };

            if (repos.length === 0) {
                return (
                    <div className="max-w-7xl mx-auto px-6 py-8">
                        <h2 className="text-3xl font-bold mb-6 text-orange">Swipe Discovery</h2>
                        <div className="card-premium p-12 text-center">
                            <p className="text-stone">Loading assets...</p>
                        </div>
                    </div>
                );
            }

            if (currentIndex >= repos.length) {
                return (
                    <div className="max-w-7xl mx-auto px-6 py-8">
                        <h2 className="text-3xl font-bold mb-6 text-orange">Swipe Discovery</h2>
                        <div className="card-premium p-12 text-center">
                            <p className="text-stone text-lg mb-4">All assets reviewed</p>
                            <p className="text-gold">{saved.length} opportunities saved</p>
                        </div>
                    </div>
                );
            }

            const currentRepo = repos[currentIndex];

            return (
                <div className="max-w-4xl mx-auto px-6 py-8">
                    <h2 className="text-3xl font-bold mb-2 text-orange">Swipe Discovery</h2>
                    <p className="text-stone mb-6">Premium asset discovery • {currentIndex + 1} of {repos.length}</p>

                    <div className="card-premium p-8 mb-6">
                        <div className="text-center mb-6">
                            <h3 className="text-2xl font-bold mb-2">{currentRepo.repo}</h3>
                            <p className="text-stone">{currentRepo.repo_data?.description || 'No description'}</p>
                        </div>

                        <div className="grid grid-cols-3 gap-4 mb-6">
                            <div className="bg-graphite/50 rounded-lg p-4 text-center">
                                <p className="metric-value text-3xl text-orange glow-orange">
                                    ${currentRepo.value_per_day?.toFixed(2) || '0.00'}
                                </p>
                                <p className="text-stone text-sm mt-1">Value/Day</p>
                            </div>
                            <div className="bg-graphite/50 rounded-lg p-4 text-center">
                                <p className="metric-value text-3xl text-gold">
                                    {currentRepo.innovation_alpha?.toFixed(2) || '0.00'}
                                </p>
                                <p className="text-stone text-sm mt-1">Innovation Alpha</p>
                            </div>
                            <div className="bg-graphite/50 rounded-lg p-4 text-center">
                                <p className="metric-value text-3xl text-warm-white">
                                    {currentRepo.value_delta?.value_delta_percent?.toFixed(0)}%
                                </p>
                                <p className="text-stone text-sm mt-1">Value Delta</p>
                            </div>
                        </div>

                        <div className="flex gap-4">
                            <button
                                onClick={() => handleSwipe('left')}
                                className="flex-1 py-4 bg-crimson/20 border border-crimson/30 text-crimson font-medium rounded-lg hover:bg-crimson/30 transition-all"
                            >
                                Ignore
                            </button>
                            <button
                                onClick={() => handleSwipe('up')}
                                className="flex-1 py-4 bg-graphite/50 border border-orange/20 text-stone font-medium rounded-lg hover:bg-graphite transition-all"
                            >
                                Mine Evidence
                            </button>
                            <button
                                onClick={() => handleSwipe('right')}
                                className="flex-1 py-4 bg-orange/20 border border-orange/30 text-orange font-medium rounded-lg hover:bg-orange/30 transition-all"
                            >
                                Save Opportunity
                            </button>
                        </div>
                    </div>

                    <div className="card-premium p-4">
                        <p className="text-stone text-sm mb-2">Keyboard Shortcuts</p>
                        <div className="flex gap-4 text-xs text-stone">
                            <span className="font-mono">← Ignore</span>
                            <span className="font-mono">↑ Mine</span>
                            <span className="font-mono">→ Save</span>
                        </div>
                    </div>
                </div>
            );
        }

        // Main App
        function App() {
            const [currentView, setCurrentView] = useState('radar');

            return (
                <div className="min-h-screen">
                    <Header currentView={currentView} setCurrentView={setCurrentView} />
                    <main>
                        {currentView === 'radar' && <RadarView />}
                        {currentView === 'alpha' && <AlphaView />}
                        {currentView === 'interventions' && <InterventionView />}
                        {currentView === 'mine' && <MineView />}
                        {currentView === 'ledger' && <LedgerView />}
                        {currentView === 'swipe' && <SwipeView />}
                        {currentView === 'search' && <div className="max-w-7xl mx-auto px-6 py-8"><p className="text-stone">Search view - Coming soon</p></div>}
                        {currentView === 'live' && <div className="max-w-7xl mx-auto px-6 py-8"><p className="text-stone">Live view - Coming soon</p></div>}
                    </main>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
