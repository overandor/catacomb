# fly.toml for Catacomb with PostgreSQL

app = "catacomb"
primary_region = "ord"

[build]
  builder = "paketobuildpacks/builder:base"

[env]
  PYTHON_VERSION = "3.11"

[deploy]
  strategy = "canary"

[[services]]
  http_checks = []
  internal_port = 8080
  processes = ["app"]

  [[services.ports]]
    force_https = true
    handlers = ["http"]
    port = 80

  [[services.tcp_checks]]
    grace_period_seconds = 10
    interval = 15
    restart_limit = 5
    timeout = 2

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256

[postgres]
  # PostgreSQL database configuration
  name = "catacomb-db"
  version = "15"
  max_connections = 20
