<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Catacomb</title>
    <link rel="stylesheet" href="/static/catacomb.css">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--obsidian-black);
            padding: 20px;
        }
        
        .login-card {
            background: var(--volcanic-graphite);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 48px;
            max-width: 440px;
            width: 100%;
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .login-logo {
            font-size: 32px;
            font-weight: 700;
            color: var(--white);
            margin-bottom: 8px;
        }
        
        .login-subtitle {
            color: var(--warm-stone);
            font-size: 14px;
        }
        
        .oauth-buttons {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .oauth-button {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 14px 24px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            background: transparent;
            color: var(--white);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
        }
        
        .oauth-button:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.3);
        }
        
        .oauth-button.google {
            border-color: rgba(66, 133, 244, 0.3);
        }
        
        .oauth-button.google:hover {
            background: rgba(66, 133, 244, 0.1);
        }
        
        .oauth-button.github {
            border-color: rgba(255, 255, 255, 0.2);
        }
        
        .oauth-button.github:hover {
            background: rgba(255, 255, 255, 0.05);
        }
        
        .oauth-icon {
            width: 20px;
            height: 20px;
        }
        
        .divider {
            display: flex;
            align-items: center;
            margin: 32px 0;
            color: var(--warm-stone);
            font-size: 12px;
        }
        
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
        }
        
        .divider span {
            padding: 0 16px;
        }
        
        .login-info {
            text-align: center;
            color: var(--warm-stone);
            font-size: 12px;
            line-height: 1.6;
        }
        
        .login-info a {
            color: var(--forged-orange);
            text-decoration: none;
        }
        
        .login-info a:hover {
            text-decoration: underline;
        }
        
        .error-message {
            background: rgba(220, 38, 38, 0.1);
            border: 1px solid rgba(220, 38, 38, 0.3);
            color: #f87171;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 24px;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="login-logo">Catacomb</div>
                <div class="login-subtitle">Innovation Allocation Engine</div>
            </div>
            
            {% if error %}
            <div class="error-message">{{ error }}</div>
            {% endif %}
            
            <div class="oauth-buttons">
                <a href="/auth/google" class="oauth-button google">
                    <svg class="oauth-icon" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                    </svg>
                    Continue with Google
                </a>
                
                <a href="/auth/github" class="oauth-button github">
                    <svg class="oauth-icon" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                    </svg>
                    Continue with GitHub
                </a>
            </div>
            
            <div class="divider">
                <span>SECURE OAUTH 2.0</span>
            </div>
            
            <div class="login-info">
                <p>By continuing, you agree to Catacomb's <a href="/terms">Terms of Service</a> and <a href="/privacy">Privacy Policy</a>.</p>
                <p style="margin-top: 12px;">Your data is encrypted and never shared with third parties.</p>
            </div>
        </div>
    </div>
</body>
</html>
