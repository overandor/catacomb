<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catacomb - Quick Capture</title>
    <link rel="stylesheet" href="/static/catacomb.css">
</head>
<body>
    <div class="nav-container">
        <div class="nav-logo">Catacomb</div>
        <nav class="nav-links">
            <a href="/radar">Radar</a>
            <a href="/alpha">Alpha</a>
            <a href="/interventions">Interventions</a>
            <a href="/mine">Mine</a>
            <a href="/ledger">Ledger</a>
            <a href="/swipe">Swipe</a>
            <a href="/search">Search</a>
            <a href="/live">Live</a>
        </nav>
    </div>

    <div class="container" style="padding: 40px 32px;">
        <div class="radar-card">
            <div class="radar-header">
                <div>
                    <div class="radar-asset-name">Quick Capture</div>
                    <div class="radar-asset-source">Rapid intervention capture</div>
                </div>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div style="padding: 12px 16px; border-radius: 6px; margin-bottom: 16px; background: rgba(26, 26, 36, 0.5); border: 1px solid rgba(255, 215, 0, 0.2); color: var(--light-stone); font-size: 13px;">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST" style="display: flex; flex-direction: column; gap: 16px;">
                <div>
                    <label style="display: block; margin-bottom: 8px; font-weight: 500; color: var(--light-stone); font-size: 13px;">Repository (owner/repo)</label>
                    <input type="text" name="repo_id" placeholder="e.g., vercel/next.js" required
                           style="width: 100%; padding: 12px 16px; border: 1px solid rgba(255, 215, 0, 0.2); border-radius: 8px; background: rgba(26, 26, 36, 0.5); color: var(--light-stone); font-size: 14px;">
                </div>

                <div>
                    <label style="display: block; margin-bottom: 8px; font-weight: 500; color: var(--light-stone); font-size: 13px;">Intervention Type</label>
                    <select name="intervention_type" required
                            style="width: 100%; padding: 12px 16px; border: 1px solid rgba(255, 215, 0, 0.2); border-radius: 8px; background: rgba(26, 26, 36, 0.5); color: var(--light-stone); font-size: 14px;">
                        <option value="">Select intervention...</option>
                        <option value="Documentation Overhaul">Documentation Overhaul</option>
                        <option value="Build System Modernization">Build System Modernization</option>
                        <option value="Feature Expansion">Feature Expansion</option>
                        <option value="SaaS Conversion">SaaS Conversion</option>
                        <option value="AI Integration">AI Integration</option>
                        <option value="Infrastructure Repositioning">Infrastructure Repositioning</option>
                        <option value="Community Building">Community Building</option>
                        <option value="Rust WASM Layer">Rust WASM Layer</option>
                        <option value="AI Agent Wrapper">AI Agent Wrapper</option>
                        <option value="Commercial API">Commercial API</option>
                        <option value="Package Ecosystem">Package Ecosystem</option>
                        <option value="Open-Core Company">Open-Core Company</option>
                    </select>
                </div>

                <div>
                    <label style="display: block; margin-bottom: 8px; font-weight: 500; color: var(--light-stone); font-size: 13px;">Planned Effort (days)</label>
                    <input type="number" name="planned_effort_days" placeholder="e.g., 14" required
                           style="width: 100%; padding: 12px 16px; border: 1px solid rgba(255, 215, 0, 0.2); border-radius: 8px; background: rgba(26, 26, 36, 0.5); color: var(--light-stone); font-size: 14px;">
                </div>

                <div>
                    <label style="display: block; margin-bottom: 8px; font-weight: 500; color: var(--light-stone); font-size: 13px;">Predicted Value (0-100)</label>
                    <input type="number" name="predicted_value" placeholder="e.g., 75" step="0.1" required
                           style="width: 100%; padding: 12px 16px; border: 1px solid rgba(255, 215, 0, 0.2); border-radius: 8px; background: rgba(26, 26, 36, 0.5); color: var(--light-stone); font-size: 14px;">
                </div>

                <div>
                    <label style="display: block; margin-bottom: 8px; font-weight: 500; color: var(--light-stone); font-size: 13px;">Your GitHub Username</label>
                    <input type="text" name="developer_username" placeholder="e.g., alice" required
                           style="width: 100%; padding: 12px 16px; border: 1px solid rgba(255, 215, 0, 0.2); border-radius: 8px; background: rgba(26, 26, 36, 0.5); color: var(--light-stone); font-size: 14px;">
                </div>

                <button type="submit" 
                        style="padding: 12px 24px; border-radius: 8px; border: none; cursor: pointer; font-size: 14px; font-weight: 600; background: var(--gold-gradient); color: #000; box-shadow: 0 0 20px rgba(255, 107, 53, 0.3); transition: all 0.3s ease;">
                    Capture Intervention
                </button>
            </form>
        </div>
    </div>
</body>
</html>
