services:
  # Web service (Flask API + static files)
  - type: web
    name: catacomb-web
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 4 -b 0.0.0.0:$PORT app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.12
      - key: DATABASE_URL
        fromDatabase:
          name: catacomb-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: catacomb-redis
          property: connectionString
      - key: GITHUB_TOKEN
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: FRONTEND_URL
        value: https://catacomb-eight.vercel.app
      - key: BACKEND_URL
        sync: false
    healthCheckPath: /api/health
    autoDeploy: true

  # Worker service (background mining jobs)
  - type: worker
    name: catacomb-worker
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python worker.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.12
      - key: DATABASE_URL
        fromDatabase:
          name: catacomb-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: catacomb-redis
          property: connectionString
      - key: GITHUB_TOKEN
        sync: false
      - key: SECRET_KEY
        fromService:
          type: web
          name: catacomb-web
          property: envVar
          envVar: SECRET_KEY
      - key: ENVIRONMENT
        value: production

databases:
  # Postgres database
  - name: catacomb-db
    databaseName: catacomb
    user: catacomb_user

# Redis for job queue
  - type: redis
    name: catacomb-redis
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []
